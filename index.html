<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#faf7f2; --bg2:#f4efe6; --sf:#ede7db;
  --bd:#d8cfc2; --bd2:#c9bfb0;
  --tp:#1c1814; --ts:#5c5147; --tm:#9c9080;
  --ac:#6b4c32; --ac2:#7d5a3c; --as:rgba(107,76,50,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
*{cursor:none!important}
body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--tp);display:flex;flex-direction:column;}

/* noise */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:.025;}

/* ✅ 自訂磁性游標 */
#cur-dot{position:fixed;width:10px;height:10px;background:var(--ac);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:multiply;}
#cur-ring{position:fixed;width:44px;height:44px;border:1.5px solid rgba(107,76,50,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
body.ch #cur-dot{width:5px;height:5px;}
body.ch #cur-ring{width:60px;height:60px;border-color:var(--ac);background:rgba(107,76,50,.04);}

/* ✅ 粒子 Canvas */
#pc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7;}

/* ✅ NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.3rem 3rem;backdrop-filter:blur(20px) saturate(1.6);background:rgba(250,247,242,.88);border-bottom:1px solid var(--bd);animation:navIn .7s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes navIn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.nav-logo{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--tm);letter-spacing:.22em;text-transform:uppercase;}
.nav-links{display:flex;gap:2.2rem;list-style:none;align-items:center;}
.nav-links a{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--ts);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.nav-links a:hover{color:var(--ac)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:4px;}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--tm);border-radius:2px;transition:all .3s;}

/* ✅ MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:0 3rem;position:relative;margin-top:64px;z-index:2;gap:4rem;}
.stage{max-width:680px;width:100%;}

/* ✅ 裝飾 */
.deco-line{display:flex;align-items:center;gap:1rem;margin-bottom:1.6rem;overflow:hidden;}
.deco-line::before{content:'';width:32px;height:1px;background:var(--ac);opacity:.7;animation:lineIn .8s .15s cubic-bezier(.16,1,.3,1) both;}
@keyframes lineIn{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}
.eyebrow{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--ac);letter-spacing:.24em;text-transform:uppercase;animation:slideUp .7s .25s cubic-bezier(.16,1,.3,1) both;}

/* ✅ 大標題（字母分割動畫） */
.big-name{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(3.8rem,8.5vw,7rem);line-height:.92;margin-bottom:2rem;letter-spacing:.01em;display:flex;gap:.3rem;align-items:baseline;flex-wrap:wrap;}
.big-name .accent{color:var(--ac);font-style:italic;}
.char{display:inline-block;animation:charIn .7s cubic-bezier(.16,1,.3,1) both;animation-delay:var(--d);}
@keyframes charIn{from{opacity:0;transform:translateY(55%) rotateX(-45deg)}to{opacity:1;transform:none}}

.typewriter-wrap{min-height:1.8rem;margin-bottom:3rem;animation:slideUp .7s .9s cubic-bezier(.16,1,.3,1) both;}
.typewriter{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--ts);letter-spacing:.05em;}
.cursor{display:inline-block;width:1.5px;height:.9em;background:var(--ac);vertical-align:middle;margin-left:3px;animation:blink .95s step-end infinite;}

/* ✅ CTA */
.cta-row{display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap;animation:slideUp .7s 1.05s cubic-bezier(.16,1,.3,1) both;}

/* 液態填充按鈕 */
.btn-enter{display:inline-flex;align-items:center;gap:.75rem;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#faf7f2;background:var(--ac);border:1px solid var(--ac);padding:.85rem 2rem;text-decoration:none;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;position:relative;overflow:hidden;}
.btn-enter::before{content:'';position:absolute;bottom:-110%;left:50%;width:130%;padding-bottom:130%;background:var(--ac2);border-radius:50%;transform:translate(-50%,0);transition:bottom .55s cubic-bezier(.16,1,.3,1);}
.btn-enter span{position:relative;z-index:1;}
.btn-enter:hover::before{bottom:-10%;}
.btn-enter:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(107,76,50,.3);}

.btn-about{display:inline-flex;align-items:center;gap:.6rem;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ts);background:transparent;border:1px solid var(--bd2);padding:.85rem 1.8rem;text-decoration:none;transition:background .2s,color .2s,transform .3s cubic-bezier(.16,1,.3,1);}
.btn-about:hover{background:var(--sf);color:var(--tp);transform:translateY(-3px);}

/* ✅ 3D 浮動裝飾圓 */
.ornament-wrap{flex-shrink:0;position:relative;width:220px;height:220px;perspective:600px;animation:slideUp .8s .45s cubic-bezier(.16,1,.3,1) both;}
.ornament-3d{width:100%;height:100%;transform-style:preserve-3d;animation:float3d 8s ease-in-out infinite;}
@keyframes float3d{0%,100%{transform:rotateX(10deg) rotateY(0deg) translateY(0)}25%{transform:rotateX(5deg) rotateY(15deg) translateY(-8px)}50%{transform:rotateX(-5deg) rotateY(0deg) translateY(-14px)}75%{transform:rotateX(5deg) rotateY(-15deg) translateY(-8px)}}
.ornament-face{position:absolute;inset:0;border-radius:50%;border:1px solid var(--bd);opacity:.35;}
.ornament-face:nth-child(2){inset:20px;border-style:dashed;border-color:var(--bd2);animation:spin 18s linear infinite;}
.ornament-face:nth-child(3){inset:42px;border-color:var(--ac);opacity:.25;animation:spin 10s linear infinite reverse;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ornament-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;}
.oc-label{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.2em;color:var(--tm);text-transform:uppercase;}
.oc-num{font-family:'Playfair Display',serif;font-size:2.4rem;color:var(--ac);line-height:1;font-weight:600;}
.oc-sub{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.15em;color:var(--tm);text-transform:uppercase;}

/* ✅ ticker */
.ticker-wrap{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--bd);background:rgba(244,239,230,.92);backdrop-filter:blur(14px);overflow:hidden;height:32px;display:flex;align-items:center;z-index:100;}
.ticker{display:flex;gap:0;white-space:nowrap;animation:tickerAnim 32s linear infinite;}
.ticker-item{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--tm);letter-spacing:.14em;text-transform:uppercase;padding:0 2.4rem;border-right:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;transition:color .2s;}
.ticker-item:hover{color:var(--ac);}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:var(--ac);opacity:.6;}

@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
@keyframes tickerAnim{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ✅ RWD */
@media(max-width:900px){main{gap:2rem;padding:0 2rem;}.ornament-wrap{width:150px;height:150px;}}
@media(max-width:640px){
  html,body{overflow:auto;}
  nav{padding:1rem 1.5rem;flex-wrap:wrap;position:relative;}
  .nav-links{display:none;flex-direction:column;width:100%;gap:1rem;padding:1rem 0 .5rem;border-top:1px solid var(--bd);margin-top:.8rem;}
  .nav-links.open{display:flex;}
  .nav-hamburger{display:flex;}
  main{flex-direction:column;align-items:flex-start;padding:2rem 1.5rem 4rem;margin-top:64px;}
  .ornament-wrap{align-self:center;width:120px;height:120px;}
  .big-name{font-size:clamp(2.4rem,12vw,3.5rem);}
  .cta-row{flex-direction:column;align-items:stretch;gap:.8rem;}
  .btn-enter,.btn-about{justify-content:center;}
}
</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="pc"></canvas>

<nav>
  <span class="nav-logo">LYZ.dev</span>
  <button class="nav-hamburger" id="hbg"><span></span><span></span><span></span></button>
  <ul class="nav-links" id="navlm">
    <li><a href="about.html#hero">Home</a></li>
    <li><a href="about.html#about">About</a></li>
    <li><a href="about.html#skills">Skills</a></li>
    <li><a href="about.html#projects">Projects</a></li>
    <li><a href="about.html#contact">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="stage">
    <div class="deco-line"><span class="eyebrow">Portfolio · 2026</span></div>
    <h1 class="big-name" id="bname">
      <span id="npart"></span><span class="accent" id="nacc">Z</span>
    </h1>
    <div class="typewriter-wrap"><span class="typewriter" id="tw"></span><span class="cursor"></span></div>
    <div class="cta-row">
      <a class="btn-enter" href="about.html"><span>查看作品集 →</span></a>
      <a class="btn-about" href="about.html#about">關於我</a>
    </div>
  </div>

  <div class="ornament-wrap">
    <div class="ornament-3d">
      <div class="ornament-face"></div>
      <div class="ornament-face"></div>
      <div class="ornament-face"></div>
    </div>
    <div class="ornament-center">
      <span class="oc-label">Projects</span>
      <span class="oc-num" id="cnum">0</span>
      <span class="oc-sub">Completed</span>
    </div>
  </div>
</main>

<div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>

<script>
/* ── 磁性游標 ── */
const dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});

/* ── 粒子背景 ── */
const cv=document.getElementById('pc'),cx=cv.getContext('2d');
let ps=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;}rsz();window.addEventListener('resize',rsz);
class P{
  constructor(){this.reset();this.y=Math.random()*innerHeight;}
  reset(){this.x=Math.random()*cv.width;this.y=cv.height+10;this.r=Math.random()*2.2+.4;this.vy=-(Math.random()*.55+.15);this.vx=(Math.random()-.5)*.25;this.a=Math.random()*.45+.08;this.life=0;this.ml=Math.random()*320+180;}
  upd(){
    this.x+=this.vx;this.y+=this.vy;this.life++;
    const dx=mx-this.x,dy=my-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<130){this.x+=dx*.0025;this.y+=dy*.0025;}
    if(this.life>this.ml||this.y<-10)this.reset();
  }
  draw(){
    const f=this.life<40?this.life/40:this.life>this.ml-60?(this.ml-this.life)/60:1;
    cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);
    cx.fillStyle=`rgba(107,76,50,${this.a*f})`;cx.fill();
  }
}
for(let i=0;i<65;i++)ps.push(new P());
(function anim(){
  cx.clearRect(0,0,cv.width,cv.height);
  ps.forEach((p,i)=>{
    ps.slice(i+1).forEach(q=>{const dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);if(d<85){cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.strokeStyle=`rgba(107,76,50,${(1-d/85)*.07})`;cx.lineWidth=.5;cx.stroke();}});
    p.upd();p.draw();
  });
  requestAnimationFrame(anim);
})();

/* ── 文字分割動畫 ── */
const npart=document.getElementById('npart'),nacc=document.getElementById('nacc');
[...'L · Y · '].forEach((c,i)=>{const s=document.createElement('span');s.className='char';s.style.setProperty('--d',`${.3+i*.065}s`);s.textContent=c===' '?'\u00A0':c;npart.appendChild(s);});
nacc.classList.add('char');nacc.style.setProperty('--d',`${.3+8*.065}s`);

/* ── 數字計數動畫 ── */
function countUp(el,n,dur=1800){let s=null;(function f(ts){if(!s)s=ts;const p=Math.min((ts-s)/dur,1),e=1-Math.pow(1-p,3);el.textContent=Math.floor(e*n);if(p<1)requestAnimationFrame(f);else el.textContent=n;})(0);}
setTimeout(()=>countUp(document.getElementById('cnum'),6),1300);

/* ── 打字機 ── */
const ph=["深度學習研究者","電機工程系學生","Android App Developer","PCB Circuit Builder","Signal Processing · MATLAB","AI Medical Imaging"];
let pi=0,ci=0,dl=false;const tw=document.getElementById('tw');
function type(){const p=ph[pi];if(!dl){tw.textContent=p.slice(0,++ci);if(ci===p.length){dl=true;setTimeout(type,2000);return;}}else{tw.textContent=p.slice(0,--ci);if(ci===0){dl=false;pi=(pi+1)%ph.length;}}setTimeout(type,dl?36:72);}
setTimeout(type,1500);

/* ── 跑馬燈 ── */
const items=["Deep Learning","PyTorch","DenseNet121","Android Studio","Java","MATLAB","FFT · Convolution","Arduino","Bluetooth","PCB Design","Soldering","EAGLE","Streamlit","Python 3.8","CUDA 12.1","App Inventor","Brain Tumor MRI","Signal Processing"];
const tk=document.getElementById('ticker');const seg=items.map(i=>`<span class="ticker-item"><span class="ticker-dot"></span>${i}</span>`).join('');tk.innerHTML=seg+seg;

/* ── 漢堡 ── */
document.getElementById('hbg').addEventListener('click',()=>document.getElementById('navlm').classList.toggle('open'));
</script>
</body>
</html>
