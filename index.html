<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#faf7f2;
  --bg2:#f4efe6;
  --sf:#ede7db;
  --bd:#d8cfc2;
  --bd2:#c9bfb0;
  --tp:#1c1814;
  --ts:#5c5147;
  --tm:#9c9080;
  --ac:#6b4c32;
  --ac2:#7d5a3c;
  --as:rgba(107,76,50,.09);
  --gold:#8a6545;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans TC',sans-serif;font-weight:300;
  background:var(--bg);color:var(--tp);
  display:flex;flex-direction:column;
}

/* noise texture overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity:.028;
}

/* warm grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--bd) 1px,transparent 1px),
    linear-gradient(90deg,var(--bd) 1px,transparent 1px);
  background-size:72px 72px;
  opacity:.28;pointer-events:none;z-index:0;
}

/* ── nav ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:1.3rem 3rem;
  backdrop-filter:blur(16px) saturate(1.4);
  background:rgba(250,247,242,.82);
  border-bottom:1px solid var(--bd);
}
.nav-logo{
  font-family:'DM Mono',monospace;font-size:.7rem;
  color:var(--tm);letter-spacing:.22em;text-transform:uppercase;
}
.nav-links{
  display:flex;gap:2.2rem;list-style:none;
}
.nav-links a{
  font-family:'DM Mono',monospace;font-size:.64rem;
  color:var(--ts);letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;transition:color .2s;
  position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;
  height:1px;background:var(--ac);transform:scaleX(0);
  transform-origin:left;transition:transform .25s ease;
}
.nav-links a:hover{color:var(--ac)}
.nav-links a:hover::after{transform:scaleX(1)}

/* ── main stage ── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:0 3rem;position:relative;
  margin-top:64px;z-index:1;
}
.stage{max-width:680px;width:100%}

/* decorative line */
.deco-line{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.6rem;
  opacity:0;animation:fadeUp .6s .05s forwards;
}
.deco-line::before{
  content:'';width:32px;height:1px;background:var(--ac);opacity:.7;
}

.eyebrow{
  font-family:'DM Mono',monospace;font-size:.67rem;
  color:var(--ac);letter-spacing:.24em;text-transform:uppercase;
}

.big-name{
  font-family:'Playfair Display',serif;font-weight:400;
  font-size:clamp(3.8rem,8.5vw,7rem);
  line-height:.92;margin-bottom:2rem;
  letter-spacing:.01em;
  opacity:0;animation:fadeUp .7s .2s forwards;
}
.big-name .accent{
  color:var(--ac);font-style:italic;font-weight:400;
}

.typewriter-wrap{
  min-height:1.8rem;margin-bottom:3rem;
  opacity:0;animation:fadeUp .7s .38s forwards;
}
.typewriter{
  font-family:'DM Mono',monospace;font-size:.82rem;
  color:var(--ts);letter-spacing:.05em;
}
.cursor{
  display:inline-block;width:1.5px;height:.9em;
  background:var(--ac);vertical-align:middle;margin-left:3px;
  animation:blink .95s step-end infinite;
}

.cta-row{
  display:flex;gap:1.2rem;align-items:center;
  opacity:0;animation:fadeUp .7s .52s forwards;
}

.btn-enter{
  display:inline-flex;align-items:center;gap:.75rem;
  font-family:'DM Mono',monospace;font-size:.68rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:#faf7f2;background:var(--ac);
  border:1px solid var(--ac);padding:.85rem 2rem;
  text-decoration:none;cursor:pointer;
  transition:background .25s,color .25s,border-color .25s;
  position:relative;overflow:hidden;
}
.btn-enter::before{
  content:'';position:absolute;inset:0;
  background:var(--ac2);transform:translateX(-100%);
  transition:transform .3s ease;
}
.btn-enter span{position:relative;z-index:1}
.btn-enter:hover::before{transform:translateX(0)}

.btn-about{
  display:inline-flex;align-items:center;gap:.6rem;
  font-family:'DM Mono',monospace;font-size:.68rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--ts);background:transparent;
  border:1px solid var(--bd2);padding:.85rem 1.8rem;
  text-decoration:none;cursor:pointer;
  transition:background .2s,border-color .2s,color .2s;
}
.btn-about:hover{background:var(--sf);border-color:var(--bd2);color:var(--tp)}

/* corner ornament */
.ornament{
  position:absolute;right:3rem;top:50%;transform:translateY(-50%);
  width:200px;height:200px;
  border:1px solid var(--bd);border-radius:50%;
  opacity:.25;pointer-events:none;
}
.ornament::before{
  content:'';position:absolute;inset:24px;
  border:1px solid var(--bd2);border-radius:50%;
}
.ornament::after{
  content:'';position:absolute;inset:48px;
  border:1px dashed var(--bd2);border-radius:50%;
}

/* ── ticker ── */
.ticker-wrap{
  position:fixed;bottom:0;left:0;right:0;
  border-top:1px solid var(--bd);
  background:rgba(244,239,230,.9);backdrop-filter:blur(12px);
  overflow:hidden;height:30px;display:flex;align-items:center;
  z-index:10;
}
.ticker{
  display:flex;gap:0;white-space:nowrap;
  animation:ticker 28s linear infinite;
}
.ticker-item{
  font-family:'DM Mono',monospace;font-size:.57rem;
  color:var(--tm);letter-spacing:.14em;text-transform:uppercase;
  padding:0 2.4rem;border-right:1px solid var(--bd);
  display:flex;align-items:center;gap:.5rem;
}
.ticker-dot{
  width:3px;height:3px;border-radius:50%;
  background:var(--ac);flex-shrink:0;opacity:.6;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:none}
}
@keyframes blink{50%{opacity:0}}
@keyframes ticker{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}
</style>
</head>
<body>

<nav>
  <span class="nav-logo">LYZ.dev</span>
  <ul class="nav-links">
    <li><a href="about.html#hero">Home</a></li>
    <li><a href="about.html#about">About</a></li>
    <li><a href="about.html#skills">Skills</a></li>
    <li><a href="about.html#projects">Projects</a></li>
    <li><a href="about.html#contact">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="stage">
    <div class="deco-line">
      <span class="eyebrow">Portfolio · 2026</span>
    </div>
    <h1 class="big-name">L · Y · <span class="accent">Z</span></h1>
    <div class="typewriter-wrap">
      <span class="typewriter" id="tw"></span><span class="cursor"></span>
    </div>
    <div class="cta-row">
      <a class="btn-enter" href="about.html"><span>查看作品集 →</span></a>
      <a class="btn-about" href="about.html#about">關於我</a>
    </div>
  </div>
  <div class="ornament"></div>
</main>

<div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>

<script>
const phrases=["深度學習研究者","電機工程系學生","Android App Developer","PCB Circuit Builder","Signal Processing · MATLAB","AI Medical Imaging"];
let pi=0,ci=0,del=false;
const tw=document.getElementById('tw');
function type(){
  const p=phrases[pi];
  if(!del){tw.textContent=p.slice(0,++ci);if(ci===p.length){del=true;setTimeout(type,2000);return;}}
  else{tw.textContent=p.slice(0,--ci);if(ci===0){del=false;pi=(pi+1)%phrases.length;}}
  setTimeout(type,del?38:72);
}
setTimeout(type,1100);

const items=["Deep Learning","PyTorch","DenseNet121","Android Studio","Java","MATLAB","FFT · Convolution","Arduino","Bluetooth","PCB Design","Soldering","EAGLE","Streamlit","Python 3.8","CUDA 12.1","App Inventor","Brain Tumor MRI","Signal Processing"];
const t=document.getElementById('ticker');
const seg=items.map(i=>`<span class="ticker-item"><span class="ticker-dot"></span>${i}</span>`).join('');
t.innerHTML=seg+seg;
</script>
</body>
</html>
