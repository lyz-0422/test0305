<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · 今日決策中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#faf7f2;--bg2:#f4efe6;--sf:#ede7db;
  --bd:#d8cfc2;--bd2:#c9bfb0;
  --tp:#1c1814;--ts:#5c5147;--tm:#9c9080;
  --ac:#6b4c32;--ac2:#7d5a3c;--as:rgba(107,76,50,.09);
  /* tab accent colors */
  --food-c:#c0663a;--food-bg:rgba(192,102,58,.08);
  --wear-c:#4a6fa5;--wear-bg:rgba(74,111,165,.08);
  --watch-c:#7a4e9e;--watch-bg:rgba(122,78,158,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
*{cursor:none!important}
body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--tp);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:.025;}
#cur-dot{position:fixed;width:10px;height:10px;background:var(--ac);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:multiply;}
#cur-ring{position:fixed;width:44px;height:44px;border:1.5px solid rgba(107,76,50,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s;}
body.ch #cur-dot{width:5px;height:5px;}
body.ch #cur-ring{width:62px;height:62px;border-color:var(--ac);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 3rem;backdrop-filter:blur(20px) saturate(1.6);background:rgba(250,247,242,.9);border-bottom:1px solid var(--bd);animation:navIn .6s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes navIn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.nav-left{display:flex;align-items:center;gap:1.5rem;}
.nav-logo{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--tm);letter-spacing:.14em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.nav-logo:hover{color:var(--ac);}
.nav-div{width:1px;height:14px;background:var(--bd);}
.nav-back{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--ts);letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:color .2s;}
.nav-back:hover{color:var(--ac);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--ts);letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--ac);}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:4px;}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--tm);border-radius:2px;transition:all .3s;}
#live-clock{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--tm);letter-spacing:.1em;display:flex;align-items:center;gap:.5rem;}
.clock-dot{width:5px;height:5px;border-radius:50%;background:#6dbf7e;animation:pulseDot 2s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* MAIN */
main{position:relative;z-index:2;padding:110px 3rem 80px;max-width:960px;margin:0 auto;}

/* HERO */
.hero{margin-bottom:3rem;animation:slideUp .7s .1s cubic-bezier(.16,1,.3,1) both;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--ac);letter-spacing:.25em;text-transform:uppercase;margin-bottom:.8rem;display:flex;align-items:center;gap:1rem;}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--ac);opacity:.6;}
.hero-h1{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2.4rem,5.5vw,4rem);line-height:1;letter-spacing:-.01em;margin-bottom:.5rem;}
.hero-h1 em{font-style:italic;color:var(--ac);}
.hero-sub{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--tm);letter-spacing:.06em;}

/* TAB BAR */
.tab-bar{display:flex;gap:0;border:1px solid var(--bd);margin-bottom:2rem;animation:slideUp .7s .2s cubic-bezier(.16,1,.3,1) both;overflow:hidden;}
.tab-btn{flex:1;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;padding:1rem .5rem;background:var(--bg2);border:none;border-right:1px solid var(--bd);color:var(--tm);transition:background .25s,color .25s;display:flex;flex-direction:column;align-items:center;gap:.4rem;position:relative;}
.tab-btn:last-child{border-right:none;}
.tab-btn .tab-ico{font-size:1.3rem;transition:transform .3s cubic-bezier(.16,1,.3,1);}
.tab-btn:hover .tab-ico{transform:scale(1.15);}
.tab-btn.active-food{background:var(--food-bg);color:var(--food-c);}
.tab-btn.active-wear{background:var(--wear-bg);color:var(--wear-c);}
.tab-btn.active-watch{background:var(--watch-bg);color:var(--watch-c);}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;transform:scaleX(0);transition:transform .3s cubic-bezier(.16,1,.3,1);}
.tab-btn.active-food::after{background:var(--food-c);transform:scaleX(1);}
.tab-btn.active-wear::after{background:var(--wear-c);transform:scaleX(1);}
.tab-btn.active-watch::after{background:var(--watch-c);transform:scaleX(1);}

/* PANELS */
.panel{display:none;animation:panelIn .4s cubic-bezier(.16,1,.3,1) both;}
.panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* SHARED CARD STYLES */
.config-card{border:1px solid var(--bd);background:var(--bg2);padding:2rem 2.2rem;margin-bottom:1.6rem;position:relative;}
.config-card::before{content:'';position:absolute;top:8px;right:8px;width:22px;height:22px;border-top:1px solid var(--bd2);border-right:1px solid var(--bd2);}
.config-title{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.4rem;display:flex;align-items:center;gap:.7rem;}
.config-title::before{content:'';width:20px;height:1px;opacity:.7;}
.food-title{color:var(--food-c);}
.food-title::before{background:var(--food-c);}
.wear-title{color:var(--wear-c);}
.wear-title::before{background:var(--wear-c);}
.watch-title{color:var(--watch-c);}
.watch-title::before{background:var(--watch-c);}

.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.4rem;}
.form-group{display:flex;flex-direction:column;gap:.45rem;}
.form-label{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--tm);letter-spacing:.14em;text-transform:uppercase;}
.form-select{background:rgba(255,255,255,.6);border:1px solid var(--bd);padding:.6rem .8rem;font-family:'DM Mono',monospace;font-size:.74rem;color:var(--tp);outline:none;transition:border-color .25s;appearance:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%239c9080' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right .7rem center;background-size:10px;padding-right:1.8rem;width:100%;}

/* CHIP TAGS */
.chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.4rem;}
.chip{font-family:'DM Mono',monospace;font-size:.58rem;padding:.22rem .7rem;border:1px solid var(--bd);color:var(--ts);background:rgba(255,255,255,.5);transition:all .2s;}
.chip.sel-food{background:var(--food-c);color:#fff;border-color:var(--food-c);}
.chip.sel-wear{background:var(--wear-c);color:#fff;border-color:var(--wear-c);}
.chip.sel-watch{background:var(--watch-c);color:#fff;border-color:var(--watch-c);}

/* SPIN BUTTON */
.spin-btn{width:100%;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#faf7f2;border:none;padding:.95rem 2rem;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,opacity .2s;position:relative;overflow:hidden;}
.spin-btn::before{content:'';position:absolute;bottom:-110%;left:50%;width:130%;padding-bottom:130%;border-radius:50%;transform:translate(-50%,0);transition:bottom .55s cubic-bezier(.16,1,.3,1);}
.spin-btn span{position:relative;z-index:1;}
.spin-btn:hover::before{bottom:-10%;}
.spin-btn:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.18);}
.spin-btn:disabled{opacity:.5;transform:none;box-shadow:none;}
.spin-btn:disabled::before{display:none;}
.food-btn{background:var(--food-c);}
.food-btn::before{background:#a8542a;}
.wear-btn{background:var(--wear-c);}
.wear-btn::before{background:#3a5a8a;}
.watch-btn{background:var(--watch-c);}
.watch-btn::before{background:#5e3a7e;}

/* WHEEL */
.wheel-area{display:flex;align-items:center;gap:2.5rem;margin-bottom:1.6rem;}
.wheel-wrap{position:relative;flex-shrink:0;}
.wheel-wrap canvas{border-radius:50%;display:block;}
.wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
.food-ptr{border-top:20px solid var(--food-c);}
.wear-ptr{border-top:20px solid var(--wear-c);}
.watch-ptr{border-top:20px solid var(--watch-c);}

/* RESULT */
.result-box{flex:1;min-width:0;}
.result-empty{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--tm);text-align:center;padding:2rem 1rem;border:1px dashed var(--bd);font-style:italic;}
.result-card{border:1px solid var(--bd);background:var(--bg);padding:1.6rem;display:none;animation:resIn .4s cubic-bezier(.16,1,.3,1) both;}
@keyframes resIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.res-tag{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.6rem;}
.res-emoji{font-size:2.6rem;display:block;margin-bottom:.5rem;animation:popIn .4s .1s cubic-bezier(.16,1,.3,1) both;}
@keyframes popIn{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.res-name{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:400;line-height:1.1;margin-bottom:.4rem;}
.res-name em{font-style:italic;}
.res-desc{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--tm);line-height:1.7;margin-bottom:1rem;}
.res-pills{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1.2rem;}
.res-pill{font-family:'DM Mono',monospace;font-size:.56rem;padding:.18rem .55rem;border:1px solid var(--bd);color:var(--ts);}
.res-actions{display:flex;gap:.6rem;}
.res-retry{flex:1;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ts);background:transparent;border:1px solid var(--bd2);padding:.6rem;}
.res-retry:hover{background:var(--sf);}
.res-accept{flex:1;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;border:none;padding:.6rem;}

/* HISTORY BAR */
.history-row{border:1px solid var(--bd);overflow:hidden;}
.history-hd{display:flex;align-items:center;gap:.8rem;padding:.7rem 1.2rem;background:var(--bg2);border-bottom:1px solid var(--bd);}
.history-hd-title{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ac);flex:1;}
.history-clear{font-family:'DM Mono',monospace;font-size:.54rem;color:var(--tm);background:transparent;border:none;transition:color .2s;}
.history-clear:hover{color:var(--ac);}
.history-items{display:flex;flex-direction:column;}
.history-item{display:flex;align-items:center;gap:1rem;padding:.65rem 1.2rem;border-bottom:1px solid var(--bd);font-family:'DM Mono',monospace;font-size:.62rem;color:var(--ts);transition:background .2s;}
.history-item:last-child{border-bottom:none;}
.history-item:hover{background:var(--bg2);}
.h-emoji{font-size:1rem;flex-shrink:0;}
.h-name{flex:1;}
.h-mode{font-size:.54rem;padding:.1rem .4rem;border:1px solid var(--bd);color:var(--tm);}
.h-time{color:var(--tm);font-size:.56rem;}
.history-empty{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--tm);text-align:center;padding:1rem;font-style:italic;}

/* TICKER */
.ticker-wrap{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--bd);background:rgba(244,239,230,.92);backdrop-filter:blur(14px);overflow:hidden;height:32px;display:flex;align-items:center;z-index:100;}
.ticker{display:flex;white-space:nowrap;animation:tickerAnim 55s linear infinite;}
.ticker-item{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--tm);letter-spacing:.14em;text-transform:uppercase;padding:0 2.2rem;border-right:1px solid var(--bd);display:flex;align-items:center;gap:.5rem;}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:var(--ac);opacity:.6;}

@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes tickerAnim{from{transform:translateX(0)}to{transform:translateX(-50%)}}

@media(max-width:760px){
  nav{padding:1rem 1.5rem;flex-wrap:wrap;}
  .nav-links{display:none;flex-direction:column;width:100%;gap:1rem;padding:1rem 0 .5rem;border-top:1px solid var(--bd);margin-top:.8rem;}
  .nav-links.open{display:flex;}
  .nav-hamburger{display:flex;}
  main{padding:90px 1.5rem 70px;}
  .form-grid{grid-template-columns:1fr 1fr;}
  .wheel-area{flex-direction:column;align-items:center;}
  .tab-btn{font-size:.55rem;padding:.8rem .3rem;}
}
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr;}
  .tab-btn .tab-ico{font-size:1rem;}
}
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<nav>
  <div class="nav-left">
    <a class="nav-logo" href="index.html">LYZ.dev</a>
    <div class="nav-div"></div>
    <a class="nav-back" href="index.html">← Home</a>
  </div>
  <div id="live-clock"><span class="clock-dot"></span><span id="clock-time"></span></div>
  <button class="nav-hamburger" id="hbg"><span></span><span></span><span></span></button>
  <ul class="nav-links" id="navlm">
    <li><a href="about.html">Portfolio</a></li>
    <li><a href="notes.html">Notes</a></li>
    <li><a href="exercise.html">練習題</a></li>
    <li><a href="decide.html" class="active">今日決策</a></li>
    <li><a href="weekend.html">週末去哪</a></li>
  </ul>
</nav>

<main>
  <div class="hero">
    <div class="hero-eyebrow">Daily Decider · 2026</div>
    <h1 class="hero-h1">今日<em>決策中心</em></h1>
    <p class="hero-sub">吃什麼、穿什麼、看什麼 — 選好分類，讓轉盤替你煩惱</p>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active-food" id="tab-food" onclick="switchTab('food')">
      <span class="tab-ico">🍜</span>今天吃什麼
    </button>
    <button class="tab-btn" id="tab-wear" onclick="switchTab('wear')">
      <span class="tab-ico">👗</span>今天穿什麼
    </button>
    <button class="tab-btn" id="tab-watch" onclick="switchTab('watch')">
      <span class="tab-ico">🎬</span>今天看什麼
    </button>
  </div>

  <!-- ══ FOOD PANEL ══ -->
  <div class="panel active" id="panel-food">
    <div class="config-card">
      <div class="config-title food-title">設定條件</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">幾個人</label>
          <select class="form-select" id="f-ppl">
            <option value="1">1 人</option>
            <option value="2" selected>2 人</option>
            <option value="3">3–4 人</option>
            <option value="5">5 人以上</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">預算（每人）</label>
          <select class="form-select" id="f-budget">
            <option value="low">NT$100 以下</option>
            <option value="mid" selected>NT$100–250</option>
            <option value="high">NT$250–500</option>
            <option value="any">不限</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">用餐時間</label>
          <select class="form-select" id="f-time">
            <option value="breakfast">早餐</option>
            <option value="lunch" selected>午餐</option>
            <option value="dinner">晚餐</option>
            <option value="snack">宵夜</option>
          </select>
        </div>
      </div>
      <div class="form-label" style="margin-bottom:.5rem;">不能吃</div>
      <div class="chips" id="f-avoid"></div>
      <button class="spin-btn food-btn" id="f-spin" onclick="doSpin('food')"><span>🎰 幫我決定！</span></button>
    </div>
    <div class="wheel-area">
      <div class="wheel-wrap" id="fw-wrap">
        <div class="wheel-pointer food-ptr"></div>
        <canvas id="fw" width="280" height="280"></canvas>
      </div>
      <div class="result-box">
        <div class="result-empty" id="f-empty">設定條件後點擊按鈕，轉盤會幫你決定！</div>
        <div class="result-card" id="f-result">
          <div class="res-tag food-title">今天就吃這個！</div>
          <span class="res-emoji" id="f-emoji"></span>
          <div class="res-name" id="f-name"></div>
          <div class="res-desc" id="f-desc"></div>
          <div class="res-pills" id="f-pills"></div>
          <div class="res-actions">
            <button class="res-retry" onclick="doSpin('food')">再抽 ↻</button>
            <button class="res-accept food-btn" onclick="acceptResult('food')">就這個了！✓</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ WEAR PANEL ══ -->
  <div class="panel" id="panel-wear">
    <div class="config-card">
      <div class="config-title wear-title">設定條件</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">今日天氣</label>
          <select class="form-select" id="w-weather">
            <option value="hot">炎熱（30°C+）</option>
            <option value="warm" selected>溫暖（20–29°C）</option>
            <option value="cool">涼爽（15–19°C）</option>
            <option value="cold">寒冷（15°C 以下）</option>
            <option value="rain">下雨天</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">今日場合</label>
          <select class="form-select" id="w-occasion">
            <option value="school" selected>上課</option>
            <option value="casual">日常外出</option>
            <option value="date">約會</option>
            <option value="formal">正式場合</option>
            <option value="sport">運動</option>
            <option value="home">在家</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">個人風格</label>
          <select class="form-select" id="w-style">
            <option value="casual" selected>休閒簡約</option>
            <option value="chic">俐落有型</option>
            <option value="cute">可愛甜美</option>
            <option value="sporty">運動潮流</option>
            <option value="retro">復古文青</option>
          </select>
        </div>
      </div>
      <div class="form-label" style="margin-bottom:.5rem;">不想穿</div>
      <div class="chips" id="w-avoid"></div>
      <button class="spin-btn wear-btn" id="w-spin" onclick="doSpin('wear')"><span>🎰 幫我搭配！</span></button>
    </div>
    <div class="wheel-area">
      <div class="wheel-wrap" id="ww-wrap">
        <div class="wheel-pointer wear-ptr"></div>
        <canvas id="ww" width="280" height="280"></canvas>
      </div>
      <div class="result-box">
        <div class="result-empty" id="w-empty">設定條件後點擊按鈕，轉盤會幫你搭配！</div>
        <div class="result-card" id="w-result">
          <div class="res-tag wear-title">今天就穿這個！</div>
          <span class="res-emoji" id="w-emoji"></span>

/* ── Cursor ── */
const dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,select').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));
});

/* ── Clock ── */
function updateClock(){const n=new Date(),p=x=>String(x).padStart(2,'0');document.getElementById('clock-time').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;}
updateClock();setInterval(updateClock,1000);

/* ══════════════ AVOID OPTIONS ══════════════ */
const FOOD_AVOID = ["牛肉","豬肉","海鮮","辣","麵食","飯食","甜","生食"];
const WEAR_AVOID = ["裙裝","褲裝","高跟鞋","大衣","短袖","厚重"];
const WATCH_AVOID = ["動漫","韓劇","電影","綜藝","恐怖","愛情"];

let selectedAvoid = {food:[], wear:[], watch:[]};

function buildChips(containerId, opts, mode){
  const c = document.getElementById(containerId);
  opts.forEach(opt=>{
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = opt;
    chip.onclick = ()=>{
      const key = mode;
      if(selectedAvoid[key].includes(opt)){
        selectedAvoid[key] = selectedAvoid[key].filter(x=>x!==opt);
        chip.className = 'chip';
      } else {
        selectedAvoid[key].push(opt);
        chip.className = `chip sel-${mode}`;
      }
    };
    c.appendChild(chip);
  });
}
buildChips('f-avoid', FOOD_AVOID, 'food');
buildChips('w-avoid', WEAR_AVOID, 'wear');
buildChips('v-avoid', WATCH_AVOID, 'watch');

/* ══════════════ TAB SWITCHING ══════════════ */
let currentTab = 'food';
function switchTab(tab){
  currentTab = tab;
  ['food','wear','watch'].forEach(t=>{
    document.getElementById(`tab-${t}`).className = 'tab-btn';
    document.getElementById(`panel-${t}`).classList.remove('active');
  });
  document.getElementById(`tab-${tab}`).className = `tab-btn active-${tab}`;
  document.getElementById(`panel-${tab}`).classList.add('active');
  // re-draw wheel for current tab if not spun yet
  const canvasMap = {food:'fw', wear:'ww', watch:'vw'};
  const pool = getPool(tab);
  drawWheel(canvasMap[tab], pool, tab);
}

/* ══════════════ POOL LOGIC ══════════════ */
function getPool(tab){
  if(tab === 'food'){
    const time = document.getElementById('f-time').value;
    let pool = FOOD_DATA[time] || [];
    if(selectedAvoid.food.length){
      pool = pool.filter(f => !selectedAvoid.food.some(av => f.tags.includes(av)||f.name.includes(av)));
    }
    return pool.length ? pool : (FOOD_DATA[time]||[]);
  }
  if(tab === 'wear'){
    const weather = document.getElementById('w-weather').value;
    const occasion = document.getElementById('w-occasion').value;
    let pool = (WEAR_DATA[weather]&&WEAR_DATA[weather][occasion]) ? WEAR_DATA[weather][occasion] : [];
    if(!pool.length){
      // fallback: any occasion for this weather
      const wd = WEAR_DATA[weather]||{};
      pool = Object.values(wd).flat();
    }
    if(selectedAvoid.wear.length){
      pool = pool.filter(f => !selectedAvoid.wear.some(av => f.tags.includes(av)||f.name.includes(av)));
    }
    return pool.length ? pool : Object.values(WEAR_DATA.warm).flat();
  }
  if(tab === 'watch'){
    const mood = document.getElementById('v-mood').value;
    const type = document.getElementById('v-type').value;
    const moodData = WATCH_DATA[mood]||{};
    let pool = type === 'any' ? Object.values(moodData).flat() : (moodData[type]||moodData.any||[]);
    if(selectedAvoid.watch.length){
      pool = pool.filter(f => !selectedAvoid.watch.some(av => f.tags.includes(av)||f.name.includes(av)));
    }
    return pool.length ? pool : Object.values(moodData).flat();
  }
  return [];
}

/* ══════════════ WHEEL ══════════════ */
const COLOR_SETS = {
  food:['rgba(192,102,58,.8)','rgba(210,130,80,.75)','rgba(230,180,140,.9)','rgba(200,170,140,.85)','rgba(160,80,40,.7)','rgba(240,200,160,.9)'],
  wear:['rgba(74,111,165,.8)','rgba(100,140,190,.75)','rgba(160,190,220,.9)','rgba(60,90,140,.7)','rgba(120,160,200,.8)','rgba(200,215,235,.9)'],
  watch:['rgba(122,78,158,.8)','rgba(150,100,180,.75)','rgba(190,150,210,.9)','rgba(90,55,120,.7)','rgba(170,120,195,.8)','rgba(210,185,225,.9)'],
};

let wheelAngles = {food:0, wear:0, watch:0};
let isSpinning = {food:false, wear:false, watch:false};

function drawWheel(canvasId, items, mode){
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const S = 280, CX = S/2, CY = S/2, R = S/2 - 8;
  const colors = COLOR_SETS[mode];
  ctx.clearRect(0,0,S,S);
  const angle = wheelAngles[mode];
  if(!items.length){
    ctx.fillStyle = 'rgba(216,207,194,.5)';
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9c9080';
    ctx.font = '12px "DM Mono",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('設定條件後開始', CX, CY);
    return;
  }
  const sliceAngle = (Math.PI*2)/items.length;
  items.forEach((item,i)=>{
    const start = angle + i*sliceAngle, end = start+sliceAngle;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,start,end); ctx.closePath();
    ctx.fillStyle = colors[i%colors.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(250,247,242,.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    const mid = start + sliceAngle/2;
    const er = R*.62, ex = CX+er*Math.cos(mid), ey = CY+er*Math.sin(mid);
    ctx.save(); ctx.translate(ex,ey); ctx.rotate(mid+Math.PI/2);
    ctx.font = items.length>6?'14px serif':'17px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(item.emoji,0,0); ctx.restore();
    const tr = R*.32, tx = CX+tr*Math.cos(mid), ty = CY+tr*Math.sin(mid);
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(mid+Math.PI/2);
    ctx.fillStyle='rgba(250,247,242,.9)';
    ctx.font=`300 ${items.length>5?8:10}px "Noto Sans TC",sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const label = item.name.length>5?item.name.slice(0,4)+'…':item.name;
    ctx.fillText(label,0,0); ctx.restore();
  });
  ctx.beginPath(); ctx.arc(CX,CY,18,0,Math.PI*2);
  ctx.fillStyle='#faf7f2'; ctx.fill();
  ctx.strokeStyle='rgba(216,207,194,.8)'; ctx.lineWidth=2; ctx.stroke();
  ctx.font='13px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🎯',CX,CY);
}

// Initial draw all wheels
['food','wear','watch'].forEach(tab=>{
  const canvasMap = {food:'fw',wear:'ww',watch:'vw'};
  drawWheel(canvasMap[tab], getPool(tab), tab);
});

/* ══════════════ SPIN ══════════════ */
let currentResults = {food:null, wear:null, watch:null};

function doSpin(tab){
  if(isSpinning[tab]) return;
  const pool = getPool(tab);
  if(!pool.length) return;
  isSpinning[tab] = true;
  const canvasMap = {food:'fw',wear:'ww',watch:'vw'};
  const btnMap = {food:'f-spin',wear:'w-spin',watch:'v-spin'};
  const resMap = {food:'f-result',wear:'w-result',watch:'v-result'};
  const emptyMap = {food:'f-empty',wear:'w-empty',watch:'v-empty'};
  document.getElementById(btnMap[tab]).disabled = true;
  document.getElementById(resMap[tab]).style.display = 'none';
  document.getElementById(emptyMap[tab]).style.display = 'block';
  const winIndex = Math.floor(Math.random()*pool.length);
  const sliceAngle = (Math.PI*2)/pool.length;
  const targetAngle = -Math.PI/2 - (winIndex*sliceAngle + sliceAngle/2);
  const totalSpins = (Math.random()*4+6)*Math.PI*2;
  const finalAngle = wheelAngles[tab] + totalSpins + (targetAngle - ((wheelAngles[tab]+totalSpins)%(Math.PI*2)));
  const startAngle = wheelAngles[tab];
  const startTime = performance.now();
  const duration = 4000 + Math.random()*1500;
  function easeOut(t){ return 1-Math.pow(1-t,4); }
  function frame(now){
    const elapsed = now-startTime;
    const progress = Math.min(elapsed/duration,1);
    wheelAngles[tab] = startAngle + (finalAngle-startAngle)*easeOut(progress);
    drawWheel(canvasMap[tab], pool, tab);
    if(progress<1){ requestAnimationFrame(frame); }
    else{
      wheelAngles[tab] = finalAngle;
      isSpinning[tab] = false;
      document.getElementById(btnMap[tab]).disabled = false;
      showResult(tab, pool[winIndex]);
    }
  }
  requestAnimationFrame(frame);
}

function showResult(tab, item){
  currentResults[tab] = item;
  const prefix = {food:'f', wear:'w', watch:'v'}[tab];
  document.getElementById(`${prefix}-emoji`).textContent = item.emoji;
  const nameEl = document.getElementById(`${prefix}-name`);
  nameEl.innerHTML = item.name.length>1 ? item.name.slice(0,-1)+'<em>'+item.name.slice(-1)+'</em>' : `<em>${item.name}</em>`;
  document.getElementById(`${prefix}-desc`).textContent = item.desc;
  document.getElementById(`${prefix}-pills`).innerHTML = item.tags.map(t=>`<span class="res-pill">${t}</span>`).join('');
  document.getElementById(`${prefix}-result`).style.display = 'block';
  document.getElementById(`${prefix}-result`).style.animation = 'none';
  setTimeout(()=>{ document.getElementById(`${prefix}-result`).style.animation = 'resIn .4s cubic-bezier(.16,1,.3,1) both'; },10);
  document.getElementById(`${prefix}-empty`).style.display = 'none';
}

/* ══════════════ HISTORY ══════════════ */
let hist = JSON.parse(localStorage.getItem('decideHist')||'[]');
const modeLabels = {food:'🍜 吃', wear:'👗 穿', watch:'🎬 看'};

function acceptResult(tab){
  if(!currentResults[tab]) return;
  const item = currentResults[tab];
  const now = new Date();
  hist.unshift({...item, mode:tab, time:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`});
  if(hist.length>12) hist.pop();
  localStorage.setItem('decideHist', JSON.stringify(hist));
  renderHist();
  const prefix = {food:'f', wear:'w', watch:'v'}[tab];
  document.getElementById(`${prefix}-result`).style.display = 'none';
  document.getElementById(`${prefix}-empty`).style.display = 'block';
  currentResults[tab] = null;
}

function renderHist(){
  const el = document.getElementById('hist-list');
  if(!hist.length){ el.innerHTML='<div class="history-empty">還沒有決定，快去轉轉看！</div>'; return; }
  el.innerHTML = hist.map(h=>`<div class="history-item"><span class="h-emoji">${h.emoji}</span><span class="h-name">${h.name}</span><span class="h-mode">${modeLabels[h.mode]}</span><span class="h-time">${h.time}</span></div>`).join('');
}
function clearHist(){ hist=[]; localStorage.removeItem('decideHist'); renderHist(); }
renderHist();

// Re-draw on select change
['f-time','f-budget'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('change',()=>{ if(!isSpinning.food){ drawWheel('fw',getPool('food'),'food'); }}); });
['w-weather','w-occasion','w-style'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('change',()=>{ if(!isSpinning.wear){ drawWheel('ww',getPool('wear'),'wear'); }}); });
['v-time','v-mood','v-type'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('change',()=>{ if(!isSpinning.watch){ drawWheel('vw',getPool('watch'),'watch'); }}); });
</script>
