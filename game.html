        }

        .nav-logo {

            color: var(--text-main);

        }

        .nav-links {

        }

        .nav-links a {
            font-size: 12px;

        .nav-links a:hover,

        /* ── 頂部（高優先重設計）── */

            width: 100%;

            padding: 120px 32px 60px;
            display: flex;

        .intro-desc {

    <script>
        // ── Vue ──
        const { createApp } = Vue;
        createApp({}).mount("#app");

        document.getElementById("btn").addEventListener("click", () => {
            document.getElementById("site-header").style.display = "none";
            document.getElementById("game-wrapper").style.display = "flex";
            setTimeout(() => document.getElementById("game-wrapper").scrollIntoView({ behavior: "smooth" }), 50);
        });

        // ══════════════════════════════════════════
        //  貪食蛇遊戲引擎
        // ══════════════════════════════════════════
        const CELL = 20, GW = 40, GH = 30;
        const W = GW * CELL, H = GH * CELL;

        const C = {
            bg: "#FFFFFF",
            bgEx: "#F4ECE1",
            grid: "#F5F2EB",
            p1: "#3A322D",
            p1h: "#1A1512",
            p2: "#8A827B",
            p2h: "#6B645E",
            worm: "#D0C9BC",
            star: "#C5A059",
            starSm: "#DFD5BF",
            lightning: "#3A322D"
        };

        function rng(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
        function posEq(a, b) { return a[0] === b[0] && a[1] === b[1]; }
        function posIn(pos, arr) { return arr.some(p => posEq(p, pos)); }

        class Snake {
            constructor(sx, sy, color, headColor, keys, name) {
                this.coord = [[sx, sy], [sx - 1, sy], [sx - 2, sy]];
                this.color = color; this.headColor = headColor;
                this.name = name; this.keys = keys;
                this.dir = [1, 0]; this.score = 0; this.alive = true;
                this.boosted = false; this.lastMoveTime = 0; this.lastToggleTime = 0;
            }
            handleKey(key) {
                const nd = this.keys[key]; if (!nd) return;
                if (nd[0] === this.dir[0] && nd[1] === this.dir[1]) {
                    const now = performance.now();
                    if (now - this.lastToggleTime > 150) { this.boosted = !this.boosted; this.lastToggleTime = now; }
                    return;
                }
                if (this.coord.length >= 2) {
                    const dx = this.coord[1][0] - this.coord[0][0], dy = this.coord[1][1] - this.coord[0][1];
                    const back = (Math.abs(dx) > 1 || Math.abs(dy) > 1) ? [-this.dir[0], -this.dir[1]] : [dx, dy];
                    if (nd[0] !== back[0] || nd[1] !== back[1]) this.dir = nd;
                } else {
                    if (nd[0] !== -this.dir[0] || nd[1] !== -this.dir[1]) this.dir = nd;
                }
            }
            nextHead(wh) {
                const c = this.coord[0];
                for (let i = 0; i < 2; i++) if (posEq(c, wh[i])) { const o = wh[1 - i]; return [o[0] + this.dir[0], o[1] + this.dir[1]]; }
                return [c[0] + this.dir[0], c[1] + this.dir[1]];
            }
        }

        // 視覺提升：吃食物粒子效果
        class EatRipple {
            constructor(cx, cy, color) {
                this.cx = cx; this.cy = cy; this.color = color;
                this.t = 0; this.maxT = 18; // frames
            }
            draw(ctx) {
                const p = this.t / this.maxT;
                const r = p * CELL * 1.6;
                const alpha = (1 - p) * 0.5;
                ctx.beginPath();
                ctx.arc(this.cx, this.cy, r, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.globalAlpha = 1;
                this.t++;
            }
            get done() { return this.t >= this.maxT; }
        }

        class Game {
            constructor(canvas, p1name, p2name) {
                this.cv = canvas; this.ctx = canvas.getContext("2d");
                this.p1name = p1name; this.p2name = p2name;
                this.ripples = [];
                // 高優先：開局倒數
                this.countdown = 3;
                this.countdownStart = 0;
                this.countdownDone = false;
                this.reset();
            }
            reset() {
                const p1k = { KeyW: [0, -1], KeyS: [0, 1], KeyA: [-1, 0], KeyD: [1, 0] };
                const p2k = { ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0] };
                this.p1 = new Snake(Math.floor(GW / 3), Math.floor(GH / 3), C.p1, C.p1h, p1k, this.p1name);
                this.p2 = new Snake(Math.floor(GW / 3 * 2), Math.floor(GH / 3 * 2), C.p2, C.p2h, p2k, this.p2name);
                this.wormholes = []; this.spawnWormholes();
                this.foods = []; this.totalSpawned = 0; this.maxStars = 16;
                this.extreme = false; this.extremeStart = 0; this.state = "countdown";
                this.ripples = [];
                this.countdown = 3;
                this.countdownStart = performance.now();
                this.countdownDone = false;
                for (let i = 0; i < 3; i++) this.spawnStar();
                const now = performance.now();
                this.p1.lastMoveTime = now; this.p2.lastMoveTime = now;
            }
            spawnWormholes() {
                while (true) {
                    const a = [rng(2, GW - 3), rng(2, GH - 3)], b = [rng(2, GW - 3), rng(2, GH - 3)];
                    if (!posEq(a, b)) { this.wormholes = [a, b]; break; }
                }
            }
            spawnStar() {
                if (this.totalSpawned >= this.maxStars) return;
                for (let t = 0; t < 30; t++) {
                    const pos = [rng(1, GW - 2), rng(2, GH - 2)];
                    if (!posIn(pos, this.p1.coord) && !posIn(pos, this.p2.coord) &&
                        !this.foods.some(f => posEq(f.pos, pos)) && !posIn(pos, this.wormholes)) {
                        this.foods.push({ pos, type: Math.random() < 0.5 ? "big" : "small" });
                        this.totalSpawned++; break;
                    }
                }
            }
            moveSnake(s, enemy) {
                if (!s.alive) return false;
                const nh = s.nextHead(this.wormholes);
                if (nh[0] < 0 || nh[0] >= GW || nh[1] < 0 || nh[1] >= GH) { s.alive = false; return false; }
                if (posIn(nh, s.coord) || posIn(nh, enemy.coord)) { s.alive = false; return false; }
                s.coord.unshift(nh);
                const fi = this.foods.findIndex(f => posEq(nh, f.pos));
                if (fi >= 0) {
                    const pts = this.foods[fi].type === "big" ? 1 : 3;
                    s.score += pts;
                    // 視覺提升：產生吃食物漣漪
                    const cx = nh[0] * CELL + CELL / 2, cy = nh[1] * CELL + CELL / 2;
                    this.ripples.push(new EatRipple(cx, cy, s.color));
                    this.foods.splice(fi, 1);
                    this.spawnStar();
                    return true;
                } else {
                    s.coord.pop(); return false;
                }
            }
            get remaining() { return (this.maxStars - this.totalSpawned) + this.foods.length; }

            handleKey(code) {
                if (this.state === "playing" || this.state === "extreme") {
                    this.p1.handleKey(code); this.p2.handleKey(code);
                }
                if (this.state === "extreme_unlock" && code === "Enter") {
                    this.extreme = true; this.extremeStart = performance.now();
                    this.totalSpawned = 0; this.foods = [];
                    for (let i = 0; i < 16; i++) this.spawnStar();
                    const now = performance.now();
                    this.p1.lastMoveTime = now; this.p2.lastMoveTime = now;
                    this.state = "extreme";
                    document.getElementById("canvas-container").classList.add("extreme");
                    const badge = document.getElementById("sb-mode");
                    badge.textContent = "EXTREME"; badge.className = "mode-badge extreme";
                }
                if (this.state === "gameover" && code === "KeyR") this._restartFromModal();
            }

            _restartFromModal() {
                document.getElementById("gameover-modal").classList.remove("show");
                document.getElementById("canvas-container").classList.remove("extreme");
                const badge = document.getElementById("sb-mode");
                badge.textContent = "NORMAL"; badge.className = "mode-badge";
                this.reset();
            }

            showGameover() {
                let msg = "";
                if (!this.p1.alive && !this.p2.alive) msg = "雙方同時陣亡 - 平手";
                else if (!this.p1.alive) msg = `${this.p2.name} 贏得了 DAVID 稱號 🏆`;
                else if (!this.p2.alive) msg = `${this.p1.name} 贏得了 DAVID 稱號 🏆`;
                else if (this.p1.score > this.p2.score) msg = `${this.p1.name} 以分數優勢勝出`;
                else if (this.p2.score > this.p1.score) msg = `${this.p2.name} 以分數優勢勝出`;
                else msg = "雙方平分秋色";
                document.getElementById("modal-winner").textContent = msg;

                const max = Math.max(this.p1.score, this.p2.score, 1);
                const w1 = Math.max(8, Math.round(this.p1.score / max * 100));
                const w2 = Math.max(8, Math.round(this.p2.score / max * 100));
                document.getElementById("sc-p1name").textContent = this.p1.name;
                document.getElementById("sc-p2name").textContent = this.p2.name;
                const b1 = document.getElementById("sc-bar-p1");
                const b2 = document.getElementById("sc-bar-p2");
                b1.style.width = "0%"; b1.textContent = this.p1.score;
                b2.style.width = "0%"; b2.textContent = this.p2.score;
                document.getElementById("gameover-modal").classList.add("show");
                setTimeout(() => { b1.style.width = w1 + "%"; b2.style.width = w2 + "%"; }, 100);
            }

            update(now) {
                // 高優先：開局倒數邏輯
                if (this.state === "countdown") {
                    const elapsed = now - this.countdownStart;
                    const newCd = 3 - Math.floor(elapsed / 1000);
                    if (newCd <= 0) {
                        this.state = "playing";
                        this.p1.lastMoveTime = now; this.p2.lastMoveTime = now;
                    } else {
                        this.countdown = newCd;
                        // update scorebar display even during countdown
                        this._updateScorebar();
                        return;
                    }
                }

                const BASE = 130, BOOST = 40;
                if (this.state === "extreme") {
                    const elapsed = now - this.extremeStart;
                    if (elapsed >= 5000) { this.p1.boosted = true; this.p2.boosted = true; }
                    else { this.p1.boosted = false; this.p2.boosted = false; }
                }
                if (this.state === "playing" || this.state === "extreme") {
                    for (const [s, e] of [[this.p1, this.p2], [this.p2, this.p1]]) {
                        const spd = s.boosted ? BOOST : BASE;
                        if (now - s.lastMoveTime >= spd) { this.moveSnake(s, e); s.lastMoveTime = now; }
                    }
                    if (this.state === "playing" && !this.extreme && this.p1.alive && this.p2.alive && this.remaining === 0)
                        this.state = "extreme_unlock";
                    if ((this.state === "playing" || this.state === "extreme") &&
                        (!this.p1.alive || !this.p2.alive || (this.state === "extreme" && this.remaining === 0))) {
                        this.state = "gameover";
                        this.showGameover();
                    }
                }
                this._updateScorebar();
            }

            _updateScorebar() {
                const maxScore = Math.max(this.p1.score, this.p2.score, 1);
                document.getElementById("sb-p1name").textContent = this.p1.name;
                document.getElementById("sb-p2name").textContent = this.p2.name;
                document.getElementById("sb-p1score").textContent = String(this.p1.score).padStart(2, "0");
                document.getElementById("sb-p2score").textContent = String(this.p2.score).padStart(2, "0");
                document.getElementById("bar-p1").style.width = (this.p1.score / maxScore * 100) + "%";
                document.getElementById("bar-p2").style.width = (this.p2.score / maxScore * 100) + "%";
                document.getElementById("sb-stars").textContent = String(this.remaining).padStart(2, "0");

                const pp1 = document.getElementById("panel-p1"), pp2 = document.getElementById("panel-p2");
                const bl1 = document.getElementById("boost-p1"), bl2 = document.getElementById("boost-p2");
                if (this.p1.boosted) { pp1.classList.add("boosted"); bl1.textContent = "✦ BOOST"; bl1.classList.add("on"); }
                else { pp1.classList.remove("boosted"); bl1.textContent = ""; bl1.classList.remove("on"); }
                if (this.p2.boosted) { pp2.classList.add("boosted"); bl2.textContent = "✦ BOOST"; bl2.classList.add("on"); }
                else { pp2.classList.remove("boosted"); bl2.textContent = ""; bl2.classList.remove("on"); }
            }

            // 視覺提升：畫蛇頭方向指示三角
            _drawHeadIndicator(ctx, s) {
                const head = s.coord[0];
                const hx = head[0] * CELL + CELL / 2;
                const hy = head[1] * CELL + CELL / 2;
                const [dx, dy] = s.dir;
                const arrowLen = 5;
                const tipX = hx + dx * arrowLen;
                const tipY = hy + dy * arrowLen;
                // 垂直於前進方向的偏移
                const px = dy, py = -dx;
                const halfW = 3;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(tipX - dx * 8 + px * halfW, tipY - dy * 8 + py * halfW);
                ctx.lineTo(tipX - dx * 8 - px * halfW, tipY - dy * 8 - py * halfW);
                ctx.closePath();
                ctx.fillStyle = this.extreme ? C.bgEx : C.bg;
                ctx.fill();
            }

            draw(now) {
                const ctx = this.ctx;
                ctx.fillStyle = this.extreme ? C.bgEx : C.bg;
                ctx.fillRect(0, 0, W, H);
                ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
                for (let x = 0; x <= W; x += CELL) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
                for (let y = 0; y <= H; y += CELL) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

                for (const wh of this.wormholes) {
                    const cx = wh[0] * CELL + CELL / 2, cy = wh[1] * CELL + CELL / 2;
                    ctx.beginPath(); ctx.arc(cx, cy, CELL / 2 - 2, 0, Math.PI * 2); ctx.fillStyle = C.worm; ctx.fill();
                    ctx.beginPath(); ctx.arc(cx, cy, CELL / 4, 0, Math.PI * 2); ctx.fillStyle = this.extreme ? C.bgEx : C.bg; ctx.fill();
                }
                for (const f of this.foods) {
                    const cx = f.pos[0] * CELL + CELL / 2, cy = f.pos[1] * CELL + CELL / 2;
                    ctx.beginPath();
                    if (f.type === "big") { ctx.arc(cx, cy, CELL / 2 - 4, 0, Math.PI * 2); ctx.fillStyle = C.star; }
                    else { ctx.arc(cx, cy, CELL / 5, 0, Math.PI * 2); ctx.fillStyle = C.starSm; }
                    ctx.fill();
                }

                // 視覺提升：吃食物漣漪（在蛇身下層繪製）
                ctx.lineWidth = 1.5;
                for (const r of this.ripples) r.draw(ctx);
                this.ripples = this.ripples.filter(r => !r.done);

                for (const s of [this.p1, this.p2]) {
                    if (!s.alive) continue;
                    for (let i = 0; i < s.coord.length; i++) {
                        const p = s.coord[i], x = p[0] * CELL + 1, y = p[1] * CELL + 1, sz = CELL - 2;
                        ctx.fillStyle = i === 0 ? s.headColor : s.color;
                        ctx.fillRect(x, y, sz, sz);
                    }
                    // 視覺提升：蛇頭方向三角
                    this._drawHeadIndicator(ctx, s);

                    if (s.boosted && s.coord.length >= 2) {
                        const tail = s.coord[s.coord.length - 1], prev = s.coord[s.coord.length - 2];
                        const dx = tail[0] - prev[0], dy = tail[1] - prev[1];
                        if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) {
                            const lx = tail[0] + dx, ly = tail[1] + dy;
                            if (lx >= 0 && lx < GW && ly >= 0 && ly < GH) this._lightning(ctx, lx, ly);
                        }
                    }
                }

                // 高優先：開局 3-2-1 倒數畫面
                if (this.state === "countdown") {
                    ctx.fillStyle = "rgba(245, 242, 235, 0.88)";
                    ctx.fillRect(0, 0, W, H);
                    ctx.textAlign = "center";
                    ctx.fillStyle = "#3A322D";
                    ctx.font = "bold 140px 'Times New Roman', serif";
                    ctx.globalAlpha = 0.9;
                    ctx.fillText(this.countdown, W / 2, H / 2 + 50);
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = "#8A827B";
                    ctx.font = "13px 'Noto Sans TC', sans-serif";
                    ctx.letterSpacing = "4px";
                    ctx.fillText("READY", W / 2, H / 2 + 100);
                    ctx.letterSpacing = "0px";
                    return;
                }

                if (this.state === "extreme_unlock") {
                    ctx.fillStyle = "rgba(245, 242, 235, 0.9)"; ctx.fillRect(0, 0, W, H);
                    ctx.textAlign = "center";
                    ctx.fillStyle = "#A94442"; ctx.font = "32px 'Noto Sans TC', serif";
                    ctx.fillText("解鎖 · 極限模式", W / 2, H / 2 - 40);
                    ctx.fillStyle = "#3A322D"; ctx.font = "15px 'Noto Sans TC', sans-serif";
                    ctx.fillText("規則：16 星全開 / 5 秒後全程強制極速", W / 2, H / 2 + 15);
                    ctx.fillStyle = "#8A827B"; ctx.font = "italic 15px 'Noto Sans TC', sans-serif";
                    ctx.fillText("按 [ ENTER ] 開始極速狂飆...", W / 2, H / 2 + 55);
                }
                if (this.state === "extreme") {
                    const elapsed = now - this.extremeStart;
                    if (elapsed < 5000) {
                        const cnt = Math.ceil((5000 - elapsed) / 1000);
                        ctx.textAlign = "center";
                        ctx.fillStyle = "rgba(58, 50, 45, 0.15)"; ctx.font = "bold 120px 'Times New Roman', serif";
                        ctx.fillText(cnt, W / 2, H / 2 + 40);
                    }
                }
            }

            _lightning(ctx, lx, ly) {
                const x = lx * CELL + CELL / 2 - 2, y = ly * CELL + CELL / 2 - 2;
                ctx.fillStyle = "#8A827B";
                ctx.fillRect(x, y, 4, 4);
            }
        }

        // ── 主控制 ──
        let game = null, animId = null;

        document.getElementById("startBtn").addEventListener("click", startGame);
        document.getElementById("modal-restart").addEventListener("click", () => { if (game) game._restartFromModal(); });
        document.getElementById("modal-quit").addEventListener("click", quitToMenu);

        function startGame() {
            const p1 = document.getElementById("p1input").value.trim() || "P1";
            const p2 = document.getElementById("p2input").value.trim() || "P2";
            document.getElementById("name-screen").style.display = "none";
            document.getElementById("scorebar").style.display = "flex";
            document.getElementById("canvas-outer").style.display = "block";
            const canvas = document.getElementById("gameCanvas");
            game = new Game(canvas, p1, p2);
            if (animId) cancelAnimationFrame(animId);
            loop();
        }

        function quitToMenu() {
            document.getElementById("gameover-modal").classList.remove("show");
            document.getElementById("canvas-container").classList.remove("extreme");
            document.getElementById("scorebar").style.display = "none";
            document.getElementById("canvas-outer").style.display = "none";
            document.getElementById("name-screen").style.display = "flex";
            if (animId) { cancelAnimationFrame(animId); animId = null; }
            game = null;
        }

        function loop() {
            const now = performance.now();
            game.update(now);
            game.draw(now);
            animId = requestAnimationFrame(loop);
        }

        document.addEventListener("keydown", e => {
            if (!game) return;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
            if (game.state === "gameover" && e.code === "Escape") { quitToMenu(); return; }
            game.handleKey(e.code);
        });
    </script>
</body>
