<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>

<script>(function(){var t=localStorage.getItem('lyz-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="light"]{
  --bg:#F5F2EB;--panel:#FFFFFF;--text:#3A322D;--dim:#8A827B;
  --bd:#D0C9BC;--bd2:#c9bfb0;--ac:#6b4c32;--red:#A94442;
}
:root[data-theme="dark"] {
  --bg:#1A1A1A;--panel:#242424;--text:#F5F5F5;--dim:#AAAAAA;
  --bd:#333333;--bd2:#444444;--ac:#FF6B6B;
}

body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s, color .3s;}

.login-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--bd);padding:40px 32px;display:flex;flex-direction:column;gap:24px;animation:fadeIn .6s ease-out;position:relative;}
@keyframes fadeIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

.brand-section{text-align:center;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--ac);letter-spacing:.24em;text-transform:uppercase;margin-bottom:8px;}
.brand-title{font-family:'Playfair Display',serif;font-weight:400;font-size:2rem;line-height:1;margin-bottom:6px;}
.brand-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--dim);letter-spacing:.08em;}

.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--text);padding:12px;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s, background .3s, color .3s;}
.form-input:focus{border-color:var(--ac);}

.btn-login{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:12px;border:1px solid var(--text);background:var(--text);color:var(--bg);cursor:pointer;transition:all .2s;font-weight:500;text-align:center;width:100%;margin-top:8px;}
.btn-login:hover{background:var(--ac);border-color:var(--ac);color:#fff;}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;}

/* 💡 新增：返回首頁按鈕的樣式 */
.btn-back-home{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:10px;border:1px solid var(--bd);background:transparent;color:var(--ts);cursor:pointer;transition:all .2s;text-align:center;width:100%;text-decoration:none;margin-top:-4px;}
.btn-back-home:hover{background:var(--bg);border-color:var(--text);color:var(--text);}

.error-msg{color:var(--red);font-size:.75rem;display:none;text-align:center;line-height:1.4;}

.test-credentials {
  border-top: 1px dashed var(--bd);
  padding-top: 16px;
  margin-top: 8px;
  text-align: center;
}
.test-hint-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.test-hint-body {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text);
}

.loading-overlay {
  position: absolute; inset:0; background:var(--panel); display:flex; 
  flex-direction:column; align-items:center; justify-content:center; 
  z-index:20; font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--dim); letter-spacing:0.1em;
}
.loading-overlay.hide { display:none; }
</style>
</head>
<body>

<div class="login-card">
  <div class="loading-overlay" id="loadingOverlay">
    <span>CONNECTING TO FIREBASE...</span>
  </div>

  <div class="brand-section">
    <div class="eyebrow">Arcade Portal</div>
    <h1 class="brand-title">LYZ · Identity</h1>
    <div class="brand-sub">登入以存取雲端遊戲大廳</div>
  </div>

  <div style="display:flex; flex-direction:column; gap:16px;">
    <div class="form-group">
      <div class="form-label">Email / 电子信箱</div>
      <input type="email" id="email" class="form-input" placeholder="example@email.com" autocomplete="on"/>
    </div>
    <div class="form-group">
      <div class="form-label">Password / 密碼</div>
      <input type="password" id="password" class="form-input" placeholder="••••••••"/>
    </div>
    <div class="error-msg" id="errorMsg">❌ 帳號密碼錯誤或該帳號尚未在 Firebase 註冊</div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    
    <a href="index.html" class="btn-back-home">← Back to Home / 返回首頁</a>

    <div class="test-credentials">
      <div class="test-hint-title">Demo Account / 測試憑據</div>
      <div class="test-hint-body">test@example.com</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAo47TW_vtnuYofYpJLE_nA3sSlVx5Tww0",
  authDomain: "project-c2422dde-c78e-4e74-aa5.firebaseapp.com",
  databaseURL: "https://project-c2422dde-c78e-4e74-aa5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-c2422dde-c78e-4e74-aa5",
  storageBucket: "project-c2422dde-c78e-4e74-aa5.firebasestorage.app",
  messagingSenderId: "390756352133",
  appId: "1:390756352133:web:ba3f45819ec356d0a669ec",
  measurementId: "G-TC4FRF0BSZ"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const loginBtn = document.getElementById('loginBtn');
const errorEl = document.getElementById('errorMsg');
const loadingOverlay = document.getElementById('loadingOverlay');

// 💡 核心修改：確認登入狀態後，導向 index.html 而非 gamehub.html
auth.onAuthStateChanged(function(user) {
  if (user) {
    window.location.href = 'index.html';
  } else {
    loadingOverlay.classList.add('hide');
  }
});

loginBtn.addEventListener('click', executeFirebaseLogin);
document.addEventListener('keydown', e => { if(e.key === 'Enter' && !loginBtn.disabled) executeFirebaseLogin(); });

function executeFirebaseLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if(!email || !password) {
    showError("❌ 請完整輸入 Email 與密碼");
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "VERIFYING...";
  errorEl.style.display = 'none';

  auth.signInWithEmailAndPassword(email, password)
    .then(function(userCredential) {
      // 驗證成功後，會由上面的 onAuthStateChanged 自動帶去 index.html
    })
    .catch(function(error) {
      loginBtn.disabled = false;
      loginBtn.textContent = "SIGN IN";
      
      if (error.code === "auth/invalid-credential" || error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
        showError("❌ 登入失敗：電子信箱或密碼輸入錯誤");
      } else if (error.code === "auth/invalid-email") {
        showError("❌ 錯誤：請輸入格式正確的電子信箱");
      } else {
        showError("❌ 驗證伺服器拒絕請求：" + error.message);
      }
    });
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}
</script>
</body>
</html>
