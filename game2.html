<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LYZ · Breakout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #f4f1ea;
            --panel-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-dim: #767676;
            --ac: #d9534f;
            --nav-bg: #fdfbf7;
            --border-color: #e0dacb;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --font-game: 'Share Tech Mono', 'Press Start 2P', monospace;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --panel-bg: #242424;
            --text-main: #f5f5f5;
            --text-dim: #aaaaaa;
            --ac: #ff6b6b;
            --nav-bg: #1f1f1f;
            --border-color: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 導覽列：置中設計 */
        nav {
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 20px;
            z-index: 100;
        }
        .nav-logo {
            position: absolute;
            left: 20px;
            font-family: var(--font-game);
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
        }
        .nav-right {
            position: absolute;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hub-link {
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            background: var(--panel-bg);
            transition: all 0.2s;
        }
        .hub-link:hover {
            border-color: var(--text-main);
        }
        .theme-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-game);
            font-size: 0.8rem;
        }

        /* 遊戲區版面 */
        main {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }
        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .game-subtitle {
            font-family: var(--font-game);
            color: var(--ac);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .game-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .game-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* 儀表板架構 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            box-shadow: var(--shadow);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: var(--font-game);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .stat-value {
            font-family: var(--font-game);
            font-size: 1.6rem;
            font-weight: bold;
        }
        .lives-heart {
            color: var(--ac);
            letter-spacing: 2px;
        }

        /* 控制鈕與畫布 */
        .controls-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn:hover {
            border-color: var(--text-main);
            background: var(--bg);
        }
        .btn-primary {
            background: var(--text-main);
            color: var(--panel-bg);
            border-color: var(--text-main);
        }
        .btn-primary:hover {
            background: var(--ac);
            border-color: var(--ac);
            color: white;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 難度切換 */
        .difficulty-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .btn-diff {
            padding: 8px;
            font-size: 0.8rem;
            font-family: var(--font-game);
        }
        .btn-diff.active {
            background: var(--text-main);
            color: var(--panel-bg);
            border-color: var(--text-main);
        }

        /* 說明指南 */
        .guide-panel {
            margin-top: 25px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.6;
        }
        .guide-title {
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .badge {
            background: var(--bg);
            color: var(--ac);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-game);
            font-weight: bold;
            margin: 0 4px;
            border: 1px solid var(--border-color);
        }

        @media (max-width: 600px) {
            .nav-links { display: none; }
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .difficulty-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">LYZ.DEV</div>
        <ul class="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#" class="active">GAME</a></li>
            <li><a href="#">NOTES</a></li>
            <li><a href="#">EXERCISES</a></li>
        </ul>
        <div class="nav-right">
            <a href="#" class="hub-link">← 大廳</a>
            <button class="theme-btn" id="themeToggle">DARK</button>
        </div>
    </nav>

    <main>
        <div class="game-header">
            <div class="game-subtitle">ACTION GAME · 動作</div>
            <h1 class="game-title">Breakout</h1>
            <p class="game-desc">打磚塊 — 消滅所有磚塊即可過關</p>
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="scoreVal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="bestVal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">LIVES</div>
                <div class="stat-value lives-heart" id="livesVal">♥♥♥</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value" id="levelVal">1</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="btn btn-primary" id="startBtn">▶ START</button>
            <button class="btn" id="pauseBtn">⏸ PAUSE</button>
            <button class="btn" id="restartBtn">↺ RESTART</button>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div class="difficulty-row">
            <button class="btn btn-diff active" data-diff="1">LV.1 EASY</button>
            <button class="btn btn-diff" data-diff="2">LV.2 NORMAL</button>
            <button class="btn btn-diff" data-diff="3">LV.3 HARD</button>
            <button class="btn btn-diff" data-diff="4">LV.4 EXPERT</button>
        </div>

        <div class="guide-panel">
            <div class="guide-title">操作說明</div>
            <p>• 使用 <span class="badge">←</span> <span class="badge">→</span> 方向鍵 / <span class="badge">A</span> <span class="badge">D</span> 或滑鼠滑動控制擋板。</p>
            <p>• 點擊畫布或按 <span class="badge">Space</span> 鍵可發射球或暫停遊戲。</p>
            <div class="guide-title" style="margin-top: 10px;">特殊道具</div>
            <p>• 帶有星號 ⭐ 的磚塊擊碎後會隨機掉落道具：<span class="badge">W</span> 加寬板子、<span class="badge">M</span> 多球分裂。</p>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. 核心狀態宣告 (必須放在最頂層，防止未初始化錯誤)
        // ==========================================
        const state = {
            theme: 'light',
            score: 0,
            bestScore: parseInt(localStorage.getItem('breakout_best') || '0'),
            lives: 3,
            level: 1,
            isPlaying: false,
            isPaused: false,
            difficulty: 1, // 1: Easy, 2: Normal, 3: Hard, 4: Expert
            ballLaunched: false
        };

        // ==========================================
        // 2. 畫布與遊戲變數設定
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 擋板屬性
        let paddleHeight = 15;
        let paddleWidth = 120;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let paddleSpeed = 8;
        let isPaddleWide = false;
        let paddleWideTimer = null;

        // 多球系統陣列
        let balls = [];
        const baseBallSpeed = 5;

        // 磚塊設定
        let brickRows = 5;
        let brickCols = 8;
        let brickWidth = 80;
        let brickHeight = 24;
        let brickPadding = 12;
        let brickOffsetTop = 50;
        let brickOffsetLeft = 35;
        let bricks = [];

        // 掉落道具陣列
        let powerUps = [];

        // 控制鍵狀態
        let rightPressed = false;
        let leftPressed = false;

        // ==========================================
        // 3. 亮暗主題調色盤 (動態取得 CSS 變數)
        // ==========================================
        function PAL(key) {
            const rootStyle = getComputedStyle(document.documentElement);
            if (key === 'paddle') return rootStyle.getPropertyValue('--text-main').trim();
            if (key === 'ball') return rootStyle.getPropertyValue('--ac').trim();
            if (key === 'grid') return rootStyle.getPropertyValue('--border-color').trim();
            if (key === 'text') return rootStyle.getPropertyValue('--text-dim').trim();
            
            // 磚塊顏色組
            const brickColors = {
                light: ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db'],
                dark:  ['#ff6b6b', '#ff9233', '#ffde59', '#51e27a', '#54a0ff']
            };
            return brickColors[state.theme][key] || '#cccccc';
        }

        // ==========================================
        // 4. 主題初始化與切換邏輯
        // ==========================================
        const themeToggle = document.getElementById('themeToggle');
        
        function initTheme() {
            const savedTheme = localStorage.getItem('lyz-theme') || 'light';
            state.theme = savedTheme;
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeToggle.textContent = savedTheme.toUpperCase();
        }

        themeToggle.addEventListener('click', () => {
            const nextTheme = state.theme === 'light' ? 'dark' : 'light';
            state.theme = nextTheme;
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('lyz-theme', nextTheme);
            themeToggle.textContent = nextTheme.toUpperCase();
            draw(); // 切換主題時重新渲染畫布顏色
        });

        // 監聽來自其他頁面的主題同步
        window.addEventListener('storage', (e) => {
            if (e.key === 'lyz-theme' && e.newValue) {
                state.theme = e.newValue;
                document.documentElement.setAttribute('data-theme', e.newValue);
                themeToggle.textContent = e.newValue.toUpperCase();
                draw();
            }
        });

        // ==========================================
        // 5. 遊戲邏輯與初始化
        // ==========================================
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickCols; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRows; r++) {
                    // 15% 機率生成特殊帶道具磚塊
                    const isSpecial = Math.random() < 0.15;
                    bricks[c][r] = { x: 0, y: 0, status: 1, r: r, special: isSpecial };
                }
            }
        }

        function resetBallAndPaddle() {
            paddleWidth = state.difficulty === 1 ? 140 : (state.difficulty === 4 ? 90 : 120);
            paddleX = (canvas.width - paddleWidth) / 2;
            isPaddleWide = false;
            if (paddleWideTimer) clearTimeout(paddleWideTimer);

            balls = [{
                x: canvas.width / 2,
                y: canvas.height - paddleHeight - 15,
                dx: 0,
                dy: 0,
                radius: 8
            }];
            state.ballLaunched = false;
            powerUps = [];
        }

        function launchBall() {
            if (!state.ballLaunched && balls.length > 0) {
                const angle = (Math.random() * 60 - 30) * Math.PI / 180; // -30到30度之間
                const speed = baseBallSpeed + state.difficulty;
                balls[0].dx = speed * Math.sin(angle);
                balls[0].dy = -speed * Math.cos(angle);
                state.ballLaunched = true;
            }
        }

        // ==========================================
        // 6. 繪製渲染功能
        // ==========================================
        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
            ctx.fillStyle = PAL('paddle');
            ctx.fill();
            ctx.closePath();
        }

        function drawBalls() {
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = PAL('ball');
                ctx.fill();
                ctx.closePath();
            });
        }

        function drawBricks() {
            for (let c = 0; c < brickCols; c++) {
                for (let r = 0; r < brickRows; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = PAL(r % 5);
                        ctx.fill();
                        ctx.closePath();

                        // 如果是特殊道具磚，畫上一顆星星標誌
                        if (bricks[c][r].special) {
                            ctx.fillStyle = "#ffffff";
                            ctx.font = "14px Arial";
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            ctx.fillText("★", brickX + brickWidth / 2, brickY + brickHeight / 2);
                        }
                    }
                }
            }
        }

        function drawPowerUps() {
            powerUps.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.type === 'W' ? '#2ecc71' : '#9b59b6';
                ctx.fill();
                ctx.closePath();

                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 10px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(p.type, p.x, p.y);
            });
        }

        function drawStatusMessage(text) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 24px 'Share Tech Mono', sans-serif";
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 畫背景格線微調視覺感
            ctx.strokeStyle = PAL('grid');
            ctx.lineWidth = 0.5;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j=0; j<canvas.height; j+=40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            drawBricks();
            drawPaddle();
            drawBalls();
            drawPowerUps();

            // 若尚未發射，將球固定在板子上方隨板子移動
            if (!state.ballLaunched && balls.length > 0) {
                balls[0].x = paddleX + paddleWidth / 2;
                balls[0].y = canvas.height - paddleHeight - 13;
            }

            if (!state.isPlaying && state.score === 0) {
                drawStatusMessage("PRESS START TO PLAY");
            } else if (state.isPaused) {
                drawStatusMessage("PAUSED");
            }
        }

        // ==========================================
        // 7. 物理碰撞與核心更新
        // ==========================================
        function update() {
            if (!state.isPlaying || state.isPaused) return;

            // 擋板移動
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += paddleSpeed;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= paddleSpeed;
            }

            // 更新道具位置與碰撞
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.y += p.speed;

                // 道具落地消失
                if (p.y > canvas.height) {
                    powerUps.splice(i, 1);
                    continue;
                }

                // 道具接取碰撞
                if (p.y + p.radius >= canvas.height - paddleHeight - 5 && 
                    p.x >= paddleX && p.x <= paddleX + paddleWidth) {
                    
                    if (p.type === 'W') { // 寬板道具
                        if (!isPaddleWide) {
                            paddleWidth += 50;
                            isPaddleWide = true;
                        }
                        if (paddleWideTimer) clearTimeout(paddleWideTimer);
                        paddleWideTimer = setTimeout(() => {
                            paddleWidth -= 50;
                            isPaddleWide = false;
                        }, 8000);
                    } else if (p.type === 'M') { // 多球分身道具
                        const currentBallCount = balls.length;
                        for (let j = 0; j < currentBallCount; j++) {
                            const b = balls[j];
                            balls.push({
                                x: b.x, y: b.y,
                                dx: b.dx * 0.8 + (Math.random() - 0.5) * 3,
                                dy: -Math.abs(b.dy),
                                radius: b.radius
                            });
                        }
                    }
                    powerUps.splice(i, 1);
                }
            }

            // 更新所有球體的位置與碰撞
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                
                if (!state.ballLaunched) continue;

                ball.x += ball.dx;
                ball.y += ball.dy;

                // 左右牆壁碰撞
                if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                    ball.dx = -ball.dx;
                }
                // 天花板碰撞
                if (ball.y - ball.radius < 0) {
                    ball.dy = -ball.dy;
                }

                // 擋板碰撞
                if (ball.y + ball.radius >= canvas.height - paddleHeight - 5 && ball.dy > 0) {
                    if (ball.x >= paddleX && ball.x <= paddleX + paddleWidth) {
                        // 根據撞擊點計算反彈角度
                        let hitPt = (ball.x - paddleX) / paddleWidth;
                        let angle = (hitPt * 100 - 50) * 1.2 * Math.PI / 180;
                        let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                        ball.dx = speed * Math.sin(angle);
                        ball.dy = -speed * Math.cos(angle);
                    }
                }

                // 磚塊碰撞偵測
                let hitBrick = false;
                for (let c = 0; c < brickCols; c++) {
                    for (let r = 0; r < brickRows; r++) {
                        const b = bricks[c][r];
                        if (b.status === 1) {
                            if (ball.x > b.x && ball.x < b.x + brickWidth && 
                                ball.y > b.y && ball.y < b.y + brickHeight) {
                                ball.dy = -ball.dy;
                                b.status = 0;
                                state.score += 10;
                                document.getElementById('scoreVal').textContent = state.score;
                                hitBrick = true;

                                // 掉落道具觸發
                                if (b.special) {
                                    powerUps.push({
                                        x: b.x + brickWidth / 2,
                                        y: b.y + brickHeight,
                                        radius: 10,
                                        speed: 3,
                                        type: Math.random() < 0.5 ? 'W' : 'M'
                                    });
                                }
                                break;
                            }
                        }
                    }
                    if (hitBrick) break;
                }

                // 球落入谷底判定
                if (ball.y > canvas.height) {
                    balls.splice(i, 1);
                }
            }

            // 檢查所有球是否都掉光了
            if (balls.length === 0) {
                state.lives--;
                updateUI();
                if (state.lives <= 0) {
                    gameOver();
                } else {
                    resetBallAndPaddle();
                }
            }

            // 檢查過關判定（所有磚塊都消滅）
            let allCleared = true;
            for (let c = 0; c < brickCols; c++) {
                for (let r = 0; r < brickRows; r++) {
                    if (bricks[c][r].status === 1) allCleared = false;
                }
            }

            if (allCleared) {
                nextLevel();
            }
        }

        // ==========================================
        // 8. 狀態控制與 UI 更新
        // ==========================================
        function updateUI() {
            document.getElementById('scoreVal').textContent = state.score;
            document.getElementById('bestVal').textContent = state.bestScore;
            document.getElementById('levelVal').textContent = state.level;
            document.getElementById('livesVal').textContent = "♥".repeat(Math.max(0, state.lives));
        }

        function gameOver() {
            state.isPlaying = false;
            if (state.score > state.bestScore) {
                state.bestScore = state.score;
                localStorage.setItem('breakout_best', state.bestScore);
            }
            alert(`GAME OVER! Final Score: ${state.score}`);
            resetGame();
        }

        function nextLevel() {
            state.level++;
            brickRows = Math.min(8, brickRows + 1);
            initBricks();
            resetBallAndPaddle();
            updateUI();
        }

        function resetGame() {
            state.score = 0;
            state.lives = 3;
            state.level = 1;
            brickRows = 5;
            state.isPlaying = false;
            state.isPaused = false;
            initBricks();
            resetBallAndPaddle();
            updateUI();
        }

        // ==========================================
        // 9. 事件監聽處理
        // ==========================================
        
        // 鍵盤操控
        document.addEventListener("keydown", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight" || e.key.toLowerCase() === "d") rightPressed = true;
            if (e.key === "Left" || e.key === "ArrowLeft" || e.key.toLowerCase() === "a") leftPressed = true;
            if (e.key === " ") {
                e.preventDefault();
                if (!state.isPlaying) {
                    state.isPlaying = true;
                    launchBall();
                } else if (!state.ballLaunched) {
                    launchBall();
                } else {
                    state.isPaused = !state.isPaused;
                }
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight" || e.key.toLowerCase() === "d") rightPressed = false;
            if (e.key === "Left" || e.key === "ArrowLeft" || e.key.toLowerCase() === "a") leftPressed = false;
        });

        // 滑鼠與觸控滑動擋板
        canvas.addEventListener("mousemove", (e) => {
            const relativeX = e.clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = (relativeX * canvas.width / canvas.offsetWidth) - paddleWidth / 2;
            }
        });

        canvas.addEventListener("click", () => {
            if (state.isPlaying && !state.ballLaunched) launchBall();
        });

        // 按鈕綁定
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!state.isPlaying) {
                state.isPlaying = true;
                launchBall();
            }
        });
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (state.isPlaying) state.isPaused = !state.isPaused;
        });
        document.getElementById('restartBtn').addEventListener('click', resetGame);

        // 難度切換
        document.querySelectorAll('.btn-diff').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.difficulty = parseInt(e.target.getAttribute('data-diff'));
                resetGame();
            });
        });

        // ==========================================
        // 10. 遊戲主迴圈發動機
        // ==========================================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 頁面加載完成後立刻安全執行
        initTheme();
        resetGame();
        gameLoop();
    </script>
</body>
</html>
