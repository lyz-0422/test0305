<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · 2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EB;--panel:#FFFFFF;--text:#3A322D;--dim:#8A827B;
  --bd:#D0C9BC;--bd2:#c9bfb0;--ac:#6b4c32;--ac2:#7d5a3c;
  --red:#A94442;--gold:#C5A059;
  /* 2048 特有：亮色版棋盤與空心格底色 */
  --board-bg:#EAE3D5;
  --bg-cell:rgba(58, 50, 45, 0.08);
}

[data-theme="dark"] {
  --bg:#1A1A1A;--panel:#242424;--text:#F5F5F5;--dim:#AAAAAA;
  --bd:#333333;--bd2:#444444;--ac:#FF6B6B;--ac2:#FF8787;
  --red:#FF6B6B;--gold:#FFD93D;
  /* 2048 特有：深色版棋盤與空心格底色 */
  --board-bg:#2D2D2D;
  --bg-cell:rgba(255, 255, 255, 0.08);
}

body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s, color .3s;}

/* ── Nav ── */
.site-nav{position:fixed;top:0;left:0;width:100%;background:rgba(245, 242, 235, 0.92);backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid var(--bd);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:48px;animation:navIn .7s cubic-bezier(.16,1,.3,1) forwards;transition:background .3s, border-color .3s;}
[data-theme="dark"] .site-nav { background: rgba(26, 26, 26, 0.92); }
@keyframes navIn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.nav-logo{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;}
.nav-logo:hover{color:var(--ac);}
.nav-links{display:flex;gap:24px;list-style:none;flex-wrap:wrap;}
.nav-links a{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}

.nav-right { display: flex; align-items: center; gap: 16px; }
.theme-btn { font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.1em; background:transparent; border:1px solid var(--bd2); color:var(--text); padding:4px 8px; cursor:pointer; transition:all .2s; }
.theme-btn:hover { background:var(--text); color:var(--bg); }

/* ── Page ── */
.page{width:100%;max-width:660px;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--ac);letter-spacing:.24em;text-transform:uppercase;margin-bottom:12px;}
.page-title{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2.2rem,6vw,3.2rem);line-height:1;margin-bottom:8px;}
.page-title em{font-style:italic;color:var(--ac);}
.page-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--dim);letter-spacing:.08em;margin-bottom:28px;}

/* Mode Tab */
.mode-row{display:flex;gap:10px;margin-bottom:16px;width:100%;}
.mode-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--bd);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;flex:1;text-align:center;}
.mode-btn.on{border-color:var(--text);color:var(--text);font-weight:500;}

/* ── HUD ── */
.hud{display:flex;gap:12px;width:100%;margin-bottom:16px;}
.hud-box{flex:1;background:var(--panel);border:1px solid var(--bd);padding:10px 16px;display:flex;flex-direction:column;gap:4px;transition:background .3s, border-color .3s;}
.hud-box.accent{border-color:var(--ac);}
.hud-label{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;}
.hud-val{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;color:var(--text);}
.hud-box.accent .hud-val{color:var(--ac);}

/* ── Btn row ── */
.btn-row{display:flex;gap:10px;margin-bottom:16px;width:100%;}
.btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 24px;border:1px solid var(--bd2);background:transparent;color:var(--text);cursor:pointer;transition:all .2s;flex:1;}
.btn:hover,.btn.primary{background:var(--text);color:var(--bg);}
.btn.primary{border-color:var(--text);}
.btn.primary:hover{background:var(--ac);border-color:var(--ac);}

/* ── 2048 核心棋盤戰區 ── */
.game-container {
  width: 100%;
  position: relative;
  padding-bottom: 100%; /* 完美的正方形比例 */
  background: var(--board-bg);
  border: 1px solid var(--bd);
  overflow: hidden;
  margin-bottom: 24px;
  transition: background .3s, border-color .3s;
}
.grid-container {
  position: absolute;
  inset: 0;
  padding: 12px;
  display: grid;
  gap: 12px;
}
.grid-cell {
  background: var(--bg-cell);
  width: 100%;
  height: 100%;
}

/* ── 關鍵修復：動態磁磚定位系統 ── */
.tile-container {
  position: absolute;
  inset: 0;
  padding: 12px;
  pointer-events: none;
}
.tile {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: 'Playfair Display', serif;
  font-weight: 500;
  transition: left 0.15s ease-in-out, top 0.15s ease-in-out, transform 0.1s ease-in-out;
  animation: tileAppear 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes tileAppear {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.tile-inner {
  font-size: 1.8rem;
}

/* ── Overlay ── */
.overlay{display:none;position:absolute;inset:0;background:rgba(245,242,235,.88);backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;transition:background .3s;}
[data-theme="dark"] .overlay { background: rgba(26,26,26,.88); }
.overlay.show{display:flex;}
.ov-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:var(--text);}
.ov-title em{font-style:italic;color:var(--ac);}
.ov-sub{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);letter-spacing:.1em;}

/* Chart Wrapper */
.chart-wrap {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--bd);
  padding: 20px;
  margin-bottom: 24px;
}
.chart-header {
  font-family: 'DM Mono', monospace;
  font-size: .55rem;
  color: var(--dim);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
canvas#chartCvs {
  width: 100%;
  height: 120px;
  display: block;
}

/* Hint */
.hint-row{display:flex;gap:12px;width:100%;}
.hint-card{flex:1;border:1px solid var(--bd);background:var(--panel);padding:12px 14px;transition:background .3s, border-color .3s;}
.hint-title{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.hint-text{font-family:'Noto Sans TC',sans-serif;font-size:.8rem;color:var(--dim);line-height:1.7;}

@media(max-width:600px){
  .site-nav{padding:0 16px;}
  .nav-links{display: none;}
  .page{padding:68px 12px 40px;}
  .hint-row{flex-direction: column;}
  .tile-inner { font-size: 1.4rem; }
}
</style>
</head>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">LYZ.dev</a>
  <ul class="nav-links">
    <li><a href="gamehub.html">🎮 遊戲大廳</a></li>
    <li><a href="game.html">🐍 誰是DAVID蛇</a></li>
    <li><a href="game2.html">🧱 磚塊爆破樂</a></li>
    <li><a href="game3.html" class="active">🕹️ 2048</a></li>
    <li><a href="game4.html">🃏 記憶卡片</a></li>
    <li><a href="game5.html">⌨ 打字測試</a></li>
  </ul>
  <div class="nav-right">
    <a href="gamehub.html" class="nav-logo" style="letter-spacing:0.05em;">← 大廳</a>
    <button class="theme-btn" id="themeToggle">DARK</button>
  </div>
</nav>

<div class="page">
  <div class="eyebrow">Puzzle Game · 益智</div>
  <h1 class="page-title">2048</h1>
  <p class="page-sub">合併相同數字，拼出更高成就</p>

  <div class="mode-row">
    <button class="mode-btn on" id="m4">4 × 4 Classic</button>
    <button class="mode-btn" id="m5">5 × 5 Expanded</button>
  </div>

  <div class="hud">
    <div class="hud-box accent">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="hScore">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="hBest">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Moves</div>
      <div class="hud-val" id="hMoves">0</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="newGameBtn">New Game</button>
    <button class="btn" id="undoBtn">Undo</button>
    <button class="btn" id="shareBtn">Share Score</button>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="grid-container" id="gridContainer"></div>
    <div class="tile-container" id="tileContainer"></div>
    <div class="overlay" id="overlay">
      <div class="ov-title" id="ovTitle">Game Over</div>
      <div class="ov-sub" id="ovSub">— 沒有可移動的空間了 —</div>
      <button class="btn primary" id="ovBtn" style="width:160px;margin-top:8px;">再試一次</button>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-header">📈 Score History Trend (Recent 10 Games)</div>
    <canvas id="chartCvs" width="600" height="120"></canvas>
  </div>

  <div class="hint-row">
    <div class="hint-card">
      <div class="hint-title">操作方式</div>
      <div class="hint-text">鍵盤方向鍵 / WASD 移動<br>手機觸控螢幕滑動</div>
    </div>
    <div class="hint-card">
      <div class="hint-title">全新挑戰</div>
      <div class="hint-text">支援 4×4 / 5×5 雙模式切換<br>內建平滑滑動軌跡動畫</div>
    </div>
  </div>
</div>

<script>
// ==========================================
// 1. 全局核心變數狀態
// ==========================================
let currentTheme = 'light';
let size = 4;
let grid = [];
let score = 0;
let best = 0;
let moves = 0;
let gameState = 'playing'; // playing, over
let historyStack = [];
let scoreHistory = JSON.parse(localStorage.getItem('2048-history') || '[]');

const tileColors = {
  2:    { bg: '#EAE3D5', text: '#3A322D' },
  4:    { bg: '#DFD5BF', text: '#3A322D' },
  8:    { bg: '#C5A059', text: '#FFFFFF' },
  16:   { bg: '#B8843A', text: '#FFFFFF' },
  32:   { bg: '#A94442', text: '#FFFFFF' },
  64:   { bg: '#6b4c32', text: '#FFFFFF' },
  128:  { bg: '#4A3B32', text: '#FFFFFF' },
  256:  { bg: '#8B7355', text: '#FFFFFF' },
  512:  { bg: '#A68064', text: '#FFFFFF' },
  1024: { bg: '#8c6239', text: '#FFFFFF' },
  2048: { bg: '#D4AF37', text: '#FFFFFF' }
};

// ==========================================
// 2. 核心初始化功能
// ==========================================
function initGame() {
  best = parseInt(localStorage.getItem(`2048-best-${size}`) || '0');
  score = 0;
  moves = 0;
  gameState = 'playing';
  historyStack = [];
  document.getElementById('overlay').classList.remove('show');
  
  buildGridStructure();
  createEmptyGrid();
  addRandomTile();
  addRandomTile();
  updateUI();
  drawChart();
}

function buildGridStructure() {
  const container = document.getElementById('gridContainer');
  container.innerHTML = '';
  container.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  container.style.gridTemplateRows = `repeat(${size}, 1fr)`;
  
  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    container.appendChild(cell);
  }
}

function createEmptyGrid() {
  grid = [];
  for (let r = 0; r < size; r++) {
    grid[r] = [];
    for (let c = 0; c < size; c++) {
      grid[r][c] = null;
    }
  }
}

function addRandomTile() {
  const emptyCells = [];
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!grid[r][c]) emptyCells.push({r, c});
    }
  }
  if (emptyCells.length > 0) {
    const spot = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    grid[spot.r][spot.c] = {
      value: Math.random() < 0.9 ? 2 : 4,
      id: Date.now() + Math.random()
    };
  }
}

// ==========================================
// 3. 關鍵修復：渲染磁磚與動態尺寸 Calc 計算
// ==========================================
function updateUI() {
  document.getElementById('hScore').textContent = score;
  document.getElementById('hBest').textContent = best;
  document.getElementById('hMoves').textContent = moves;

  const container = document.getElementById('tileContainer');
  container.innerHTML = '';

  // 動態根據動態寬度與 gap 計算每顆 Tile 精確的位置
  const gap = 12; 
  const cellSizePercent = 100 / size;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const tileData = grid[r][c];
      if (tileData) {
        const tileEl = document.createElement('div');
        tileEl.className = 'tile';
        
        // 核心修正公式：精準對齊 Grid-cell 的 left / top
        tileEl.style.width = `calc(${cellSizePercent}% - ${(gap * (size - 1)) / size}px)`;
        tileEl.style.height = `calc(${cellSizePercent}% - ${(gap * (size - 1)) / size}px)`;
        tileEl.style.left = `calc(${c * cellSizePercent}% + ${gap - (c * gap * (size - 1)) / size}px)`;
        tileEl.style.top = `calc(${r * cellSizePercent}% + ${gap - (r * gap * (size - 1)) / size}px)`;

        // 配置美學色彩組
        const color = tileColors[tileData.value] || { bg: '#333', text: '#FFF' };
        tileEl.style.backgroundColor = color.bg;
        tileEl.style.color = color.text;

        const inner = document.createElement('div');
        inner.className = 'tile-inner';
        inner.textContent = tileData.value;
        
        // 字體依數字長度微調縮放
        if (tileData.value >= 1000) inner.style.fontSize = '1.3rem';
        else if (tileData.value >= 100) inner.style.fontSize = '1.6rem';

        tileEl.appendChild(inner);
        container.appendChild(tileEl);
      }
    }
  }

  if (score > best) {
    best = score;
    localStorage.setItem(`2048-best-${size}`, best);
  }
}

// ==========================================
// 4. 2048 核心移動物理演算
// ==========================================
function saveState() {
  const snapshot = grid.map(row => row.map(cell => cell ? { ...cell } : null));
  historyStack.push({ grid: snapshot, score, moves });
  if (historyStack.length > 30) historyStack.shift();
}

function move(direction) {
  if (gameState === 'over') return;
  
  let moved = false;
  saveState();

  // 0: up, 1: right, 2: down, 3: left
  const rotatedGrid = rotateGrid(direction);

  for (let r = 0; r < size; r++) {
    const row = rotatedGrid[r].filter(item => item !== null);
    const newRow = [];
    
    for (let i = 0; i < row.length; i++) {
      if (i + 1 < row.length && row[i].value === row[i+1].value) {
        newRow.push({ value: row[i].value * 2, id: row[i].id });
        score += row[i].value * 2;
        i++;
        moved = true;
      } else {
        newRow.push(row[i]);
      }
    }
    
    while (newRow.length < size) {
      newRow.push(null);
    }

    if (JSON.stringify(rotatedGrid[r]) !== JSON.stringify(newRow)) {
      moved = true;
    }
    rotatedGrid[r] = newRow;
  }

  grid = unrotateGrid(rotatedGrid, direction);

  if (moved) {
    moves++;
    addRandomTile();
    updateUI();
    checkGameOver();
  } else {
    historyStack.pop(); // 若沒有產生有效位移，取消這次的歷史紀錄備份
  }
}

function rotateGrid(dir) {
  let temp = grid.map(row => [...row]);
  for (let i = 0; i < dir; i++) {
    temp = rotate90(temp);
  }
  return temp;
}

function unrotateGrid(g, dir) {
  let temp = g.map(row => [...row]);
  const steps = (4 - dir) % 4;
  for (let i = 0; i < steps; i++) {
    temp = rotate90(temp);
  }
  return temp;
}

function rotate90(matrix) {
  const n = matrix.length;
  const res = [];
  for (let r = 0; r < n; r++) {
    res[r] = [];
    for (let c = 0; c < n; c++) {
      res[r][c] = matrix[n - 1 - c][r];
    }
  }
  return res;
}

function checkGameOver() {
  // 檢查是否還有空位
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!grid[r][c]) return;
    }
  }
  // 檢查相鄰是否有相同數字
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const current = grid[r][c].value;
      if (r + 1 < size && grid[r+1][c].value === current) return;
      if (c + 1 < size && grid[r][c+1].value === current) return;
    }
  }
  
  // 進入 Game Over
  gameState = 'over';
  scoreHistory.push(score);
  if (scoreHistory.length > 10) scoreHistory.shift();
  localStorage.setItem('2048-history', JSON.stringify(scoreHistory));
  
  document.getElementById('ovTitle').innerHTML = 'Game <em>Over</em>';
  document.getElementById('ovSub').textContent = `— 獲得 ${score} 分 · 盡力了！ —`;
  document.getElementById('overlay').classList.add('show');
  drawChart();
}

// ==========================================
// 5. 數據趨勢折線圖渲染 (讀取動態 CSS 變數)
// ==========================================
function drawChart() {
  const canvas = document.getElementById('chartCvs');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (scoreHistory.length === 0) {
    ctx.font = '11px "DM Mono", monospace';
    ctx.fillStyle = currentTheme === 'dark' ? '#8A827B' : '#8A827B';
    ctx.textAlign = 'center';
    ctx.fillText('NO DATA YET. COMPLETE A GAME TO TRACK TRENDS.', canvas.width / 2, canvas.height / 2);
    return;
  }

  const maxVal = Math.max(...scoreHistory, 1000);
  const padding = 20;
  const stepX = (canvas.width - padding * 2) / Math.max(1, scoreHistory.length - 1);
  
  // 網格橫線
  ctx.strokeStyle = currentTheme === 'dark' ? '#333333' : '#EAE3D5';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = padding + (canvas.height - padding * 2) * (i / 3);
    ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(canvas.width - padding, y); ctx.stroke();
  }

  // 繪製趨勢折線
  ctx.beginPath();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = currentTheme === 'dark' ? '#FF6B6B' : '#6b4c32';

  scoreHistory.forEach((val, idx) => {
    const x = padding + idx * stepX;
    const y = canvas.height - padding - (val / maxVal) * (canvas.height - padding * 2);
    if (idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 繪製頂點圓圈與標籤
  scoreHistory.forEach((val, idx) => {
    const x = padding + idx * stepX;
    const y = canvas.height - padding - (val / maxVal) * (canvas.height - padding * 2);
    
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = currentTheme === 'dark' ? '#FF6B6B' : '#6b4c32';
    ctx.fill();

    ctx.font = '9px "DM Mono", monospace';
    ctx.fillStyle = currentTheme === 'dark' ? '#AAAAAA' : '#8A827B';
    ctx.textAlign = 'center';
    ctx.fillText(val, x, y - 8);
  });
}

// ==========================================
// 6. 主題操控控制引擎 (與 David 蛇完美共用同步)
// ==========================================
const themeToggle = document.getElementById('themeToggle');

function initTheme() {
  const savedTheme = localStorage.getItem('lyz-theme') || 'light';
  currentTheme = savedTheme;
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeToggle.textContent = savedTheme.toUpperCase();
  drawChart();
}

themeToggle.addEventListener('click', () => {
  const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
  currentTheme = nextTheme;
  document.documentElement.setAttribute('data-theme', nextTheme);
  localStorage.setItem('lyz-theme', nextTheme);
  themeToggle.textContent = nextTheme.toUpperCase();
  drawChart();
});

window.addEventListener('storage', (e) => {
  if (e.key === 'lyz-theme' && e.newValue) {
    currentTheme = e.newValue;
    document.documentElement.setAttribute('data-theme', e.newValue);
    themeToggle.textContent = e.newValue.toUpperCase();
    drawChart();
  }
});

// ==========================================
// 7. 操控交互監聽處理
// ==========================================
document.addEventListener('keydown', e => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.key)) {
    e.preventDefault();
  }
  switch(e.code) {
    case 'ArrowUp':    case 'KeyW': move(0); break;
    case 'ArrowRight': case 'KeyD': move(1); break;
    case 'ArrowDown':  case 'KeyS': move(2); break;
    case 'ArrowLeft':  case 'KeyA': move(3); break;
  }
});

// 手機手勢滑動支援
let touchStartX = 0, touchStartY = 0;
document.getElementById('gameContainer').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

document.getElementById('gameContainer').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 0 ? 1 : 3);
    } else {
      move(dy > 0 ? 2 : 0);
    }
  }
}, {passive: true});

// 按鈕綁定
document.getElementById('newGameBtn').addEventListener('click', initGame);
document.getElementById('ovBtn').addEventListener('click', initGame);

document.getElementById('undoBtn').addEventListener('click', () => {
  if (historyStack.length > 0) {
    const prev = historyStack.pop();
    grid = prev.grid;
    score = prev.score;
    moves = prev.moves;
    gameState = 'playing';
    document.getElementById('overlay').classList.remove('show');
    updateUI();
  }
});

document.getElementById('shareBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(`我在 LYZ · 2048 達成了 ${score} 分！一起來挑戰吧！`);
  alert('分數已成功複製到剪貼簿！');
});

// 尺寸模式切換
document.getElementById('m4').addEventListener('click', () => {
  if (size === 4) return;
  size = 4;
  document.getElementById('m4').classList.add('on');
  document.getElementById('m5').classList.remove('on');
  initGame();
});

document.getElementById('m5').addEventListener('click', () => {
  if (size === 5) return;
  size = 5;
  document.getElementById('m5').classList.add('on');
  document.getElementById('m4').classList.remove('on');
  initGame();
});

// 啟動執行
initTheme();
initGame();
</script>
