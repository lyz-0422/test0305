<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · 2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EB;--panel:#FFFFFF;--text:#3A322D;--dim:#8A827B;
  --bd:#D0C9BC;--bd2:#c9bfb0;--ac:#6b4c32;--ac2:#7d5a3c;
  --t2:#EAE3D5;--t4:#DFD5BF;--t8:#C5A059;--t16:#B8843A;
  --t32:#A94442;--t64:#8B2E2E;--t128:#6b4c32;--t256:#4A3520;
  --t512:#2E1F10;--t1024:#1A1210;--t2048:#0A0806;
  --chart-grid:#F5F2EB;
}

/* ── 完美對齊 David 蛇的深色模式變數 ── */
[data-theme="dark"] {
  --bg:#1A1A1A;--panel:#242424;--text:#F5F5F5;--dim:#AAAAAA;
  --bd:#333333;--bd2:#444444;--ac:#FF6B6B;--ac2:#FF8787;
  --t2:#2D2D2D;--t4:#3D3D3D;--t8:#FF6B6B;--t16:#FF8787;
  --t32:#FFD93D;--t64:#FF9233;--t128:#FF6B6B;--t256:#FF8787;
  --t512:#FFD93D;--t1024:#FF9233;--t2048:#FF6B6B;
  --chart-grid:#333333;
}

body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s, color .3s;}

/* ── Nav ── */
.site-nav{position:fixed;top:0;left:0;width:100%;background:rgba(245, 242, 235, 0.92);backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid var(--bd);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:48px;animation:navIn .7s cubic-bezier(.16,1,.3,1) forwards;transition:background .3s, border-color .3s;}
[data-theme="dark"] .site-nav { background: rgba(26, 26, 26, 0.92); }
@keyframes navIn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.nav-logo{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;}
.nav-logo:hover{color:var(--ac);}
.nav-links{display:flex;gap:24px;list-style:none;flex-wrap:wrap;}
.nav-links a{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}

/* 右側控制群 */
.nav-right { display: flex; align-items: center; gap: 16px; }
.theme-btn { font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.1em; background:transparent; border:1px solid var(--bd2); color:var(--text); padding:4px 8px; cursor:pointer; transition:all .2s; }
.theme-btn:hover { background:var(--text); color:var(--bg); }

/* ── Page ── */
.page{width:100%;max-width:560px;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;gap:0;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--ac);letter-spacing:.24em;text-transform:uppercase;margin-bottom:12px;}
.page-title{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2.2rem,6vw,3.2rem);line-height:1;margin-bottom:8px;letter-spacing:.02em;}
.page-title em{font-style:italic;color:var(--ac);}
.page-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--dim);letter-spacing:.08em;margin-bottom:20px;}

/* ── Size Selector ── */
.size-row{display:flex;gap:8px;margin-bottom:20px;width:100%;}
.size-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 0;border:1px solid var(--bd);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;flex:1;}
.size-btn:hover,.size-btn.on{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ── Score bar ── */
.score-row{display:flex;gap:12px;width:100%;margin-bottom:20px;}
.score-box{flex:1;background:var(--panel);border:1px solid var(--bd);padding:10px 16px;display:flex;flex-direction:column;gap:4px;transition:background .3s, border-color .3s;}
.score-box.main{border-color:var(--ac);}
.score-label{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;}
.score-val{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;color:var(--text);}
.score-box.main .score-val{color:var(--ac);}

/* ── Buttons ── */
.btn-row{display:flex;gap:10px;margin-bottom:20px;width:100%;}
.btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:10px 14px;border:1px solid var(--bd2);background:transparent;color:var(--text);cursor:pointer;transition:all .2s;flex:1;}
.btn:hover{background:var(--text);color:var(--bg);}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn.primary:hover{background:var(--ac);border-color:var(--ac);}

/* ── Board & Animations ── */
.board-wrap{width:100%;position:relative;margin-bottom:20px;}
.board{position:relative;background:var(--bd);padding:10px;width:100%;aspect-ratio:1;user-select:none;transition:background .3s;}
.grid-bg-container {display:grid;gap:10px;width:100%;height:100%;position:absolute;top:10px;left:10px;width:calc(100% - 20px);height:calc(100% - 20px);z-index:1;}
.bg-cell{background:rgba(234,227,213,0.5);width:100%;height:100%;}
[data-theme="dark"] .bg-cell { background: rgba(255,255,255,0.05); }
.tile-container{position:absolute;top:10px;left:10px;width:calc(100% - 20px);height:calc(100% - 20px);z-index:2;}

.tile{position:absolute;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:600;transition:transform .12s cubic-bezier(0.1, 0.7, 0.1, 1);will-change:transform;}
.tile-inner {width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:background-color .12s, color .12s;}
.tile.pop .tile-inner{animation:pop .12s ease-out;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.tile.new .tile-inner{animation:appear .15s ease-out both;}
@keyframes appear{0%{transform:scale(0);opacity:0}80%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

/* tile colours */
.tile[data-v="2"] .tile-inner{background:var(--t2);color:var(--text);}
.tile[data-v="4"] .tile-inner{background:var(--t4);color:var(--text);}
.tile[data-v="8"] .tile-inner{background:var(--t8);color:#fff;}
.tile[data-v="16"] .tile-inner{background:var(--t16);color:#fff;}
.tile[data-v="32"] .tile-inner{background:var(--t32);color:#fff;}
.tile[data-v="64"] .tile-inner{background:var(--t64);color:#fff;}
.tile[data-v="128"] .tile-inner{background:var(--t128);color:#fff;}
.tile[data-v="256"] .tile-inner{background:var(--t256);color:#fff;}
.tile[data-v="512"] .tile-inner{background:var(--t512);color:#fff;}
.tile[data-v="1024"] .tile-inner{background:var(--t1024);color:#fff;}
.tile[data-v="2048"] .tile-inner{background:var(--t2048);color:var(--ac);border:2px solid var(--ac);}
.tile[data-v="4096"] .tile-inner{background:#000;color:#fff;}

/* ── Overlay ── */
.overlay{display:none;position:absolute;inset:0;background:rgba(245,242,235,.9);backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:10;transition:background .3s;}
[data-theme="dark"] .overlay { background: rgba(26,26,26,.9); }
.overlay.show{display:flex;}
.overlay-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:var(--text);}
.overlay-title em{font-style:italic;color:var(--ac);}
.overlay-sub{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);letter-spacing:.1em;}

/* ── Stats Chart ── */
.chart-card {width:100%;border:1px solid var(--bd);background:var(--panel);padding:16px;margin-bottom:20px;transition:background .3s, border-color .3s;}
.chart-title {font-family:'DM Mono',monospace;font-size:.55rem;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}
canvas#statsChart {width:100%;height:140px;background:var(--panel);display:block;transition:background .3s;}

/* ── Hint ── */
.hint-row{display:flex;gap:16px;width:100%;}
.hint-card{flex:1;border:1px solid var(--bd);background:var(--panel);padding:12px 14px;transition:background .3s, border-color .3s;}
.hint-title{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.hint-text{font-family:'Noto Sans TC',sans-serif;font-size:.8rem;color:var(--dim);line-height:1.7;}

/* ── Share Notification ── */
.toast {position:fixed;bottom:20px;background:var(--text);color:var(--bg);font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;letter-spacing:1px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}

/* ── Responsive ── */
@media(max-width:500px){
  .site-nav{padding:0 16px;}
  .nav-links{display:none;}
  .page{padding:70px 16px 40px;}
  .hint-row {flex-direction:column;gap:12px;}
}
</style>
</head>

<div class="page">
  <div class="eyebrow">Puzzle Game · 益智</div>

  <p class="page-sub">合併相同數字，拼出更高成就</p>

  <div class="size-row">

  </div>

    <div class="score-box main">

      <div class="score-val" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-val" id="best">0</div>
    </div>
    <div class="score-box">

    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="newBtn">New Game</button>

  <div class="board-wrap">

    </div>

  <div class="chart-card">

    </div>

      <div class="hint-title">全新挑戰</div>
      <div class="hint-text">支援 4×4 / 5×5 雙模式切換<br>內建平滑滑動軌跡動畫</div>
    </div>

</div>

<div class="toast" id="toast">分數已複製到剪貼簿！</div>

<script>
let SIZE = 4;
let currentTheme = 'light';
let grid, score, best, moves, prevGrid, prevScore, prevMoves;
let tilesData = []; 

function changeSize(s) {
  if (SIZE === s) return;
  SIZE = s;
  document.getElementById('size4').classList.toggle('on', s === 4);
  document.getElementById('size5').classList.toggle('on', s === 5);
  init();
}

function init() {
  grid = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  score = 0; moves = 0; 
  prevGrid = null; prevScore = 0; prevMoves = 0;
  best = parseInt(localStorage.getItem(`2048-best-${SIZE}`) || '0');
  
  const bg = document.getElementById('grid-bg');
  bg.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
  bg.innerHTML = '';
  for(let i=0; i<SIZE*SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'bg-cell';
    bg.appendChild(cell);
  }

  tilesData = [];
  document.getElementById('tile-container').innerHTML = '';
  
  addTile(); addTile();
  render();
  drawChart();
  document.getElementById('overlay').classList.remove('show');
}

function addTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (!empty.length) return;
  
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  const val = Math.random() < 0.85 ? 2 : 4;
  grid[r][c] = val;

  const id = Math.random().toString(36).substr(2, 9);
  tilesData.push({ id, r, c, val, isNew: true, isPop: false });
}

function render() {
  const container = document.getElementById('tile-container');
  container.innerHTML = '';

  const cellSize = 100 / SIZE;

  tilesData.forEach(t => {
    const tileDiv = document.createElement('div');
    tileDiv.className = `tile`;
    if (t.isNew) tileDiv.classList.add('new');
    if (t.isPop) tileDiv.classList.add('pop');
    
    tileDiv.setAttribute('data-v', t.val);
    tileDiv.style.width = `${cellSize}%`;
    tileDiv.style.height = `${cellSize}%`;
    
    tileDiv.style.transform = `translate(${t.c * 100}%, ${t.r * 100}%)`;

    const inner = document.createElement('div');
    inner.className = 'tile-inner';
    inner.textContent = t.val;
    
    const fs = SIZE === 5 ? (t.val >= 1024 ? '0.9rem' : '1.3rem') : (t.val >= 1024 ? '1.1rem' : '1.5rem');
    inner.style.fontSize = fs;

    tileDiv.appendChild(inner);
    container.appendChild(tileDiv);

    t.isNew = false;
    t.isPop = false;
  });

  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
  document.getElementById('moves').textContent = moves;
}

function move(dir) {
  let snapGrid = grid.map(r => [...r]);
  let snapScore = score;
  let snapMoves = moves;

  let changed = false;
  let gained = 0;

  const rotatedGrid = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      let targetR = r, targetC = c;
      if (dir === 'right') { targetR = r; targetC = SIZE - 1 - c; }
      if (dir === 'up')    { targetR = c; targetC = r; }
      if (dir === 'down')  { targetR = SIZE - 1 - c; targetC = SIZE - 1 - r; }
      rotatedGrid[targetR][targetC] = grid[r][c];
    }
  }

  const nextRotatedGrid = Array.from({length:SIZE}, () => Array(SIZE).fill(0));
  const mergeTracker = Array.from({length:SIZE}, () => Array(SIZE).fill(false));

  for (let r = 0; r < SIZE; r++) {
    let targetC = 0;
    for (let c = 0; c < SIZE; c++) {
      if (rotatedGrid[r][c] === 0) continue;
      
      if (targetC > 0 && nextRotatedGrid[r][targetC - 1] === rotatedGrid[r][c] && !mergeTracker[r][targetC - 1]) {
        nextRotatedGrid[r][targetC - 1] *= 2;
        gained += nextRotatedGrid[r][targetC - 1];
        mergeTracker[r][targetC - 1] = true;
        changed = true;
        updateTilePosition(r, c, r, targetC - 1, dir, nextRotatedGrid[r][targetC - 1], true);
      } else {
        nextRotatedGrid[r][targetC] = rotatedGrid[r][c];
        if (targetC !== c) changed = true;
        updateTilePosition(r, c, r, targetC, dir, rotatedGrid[r][c], false);
        targetC++;
      }
    }
  }

  // 核心修復：如果盤面沒有產生有效位移，不需要同步與重繪，直接退出以防止 DOM 動畫資料失聯
  if (!changed) {
    return;
  }

  prevGrid = snapGrid;
  prevScore = snapScore;
  prevMoves = snapMoves;

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      let origR = r, origC = c;
      if (dir === 'right') { origR = r; origC = SIZE - 1 - c; }
      if (dir === 'up')    { origR = c; origC = r; }
      if (dir === 'down')  { origR = SIZE - 1 - c; origC = SIZE - 1 - r; }
      grid[origR][origC] = nextRotatedGrid[r][c];
    }
  }

  score += gained; moves++;
  if (score > best) { best = score; localStorage.setItem(`2048-best-${SIZE}`, best); }
  
  tilesData = tilesData.filter(t => !t.mergedOut);

  addTile();
  render();
  checkEnd();
}

function updateTilePosition(rotR, rotC, nextRotR, nextRotC, dir, newVal, isMerge) {
  let origR = rotR, origC = rotC;
  if (dir === 'right') { origR = rotR; origC = SIZE - 1 - rotC; }
  if (dir === 'up')    { origR = rotC; origC = rotR; }
  if (dir === 'down')  { origR = SIZE - 1 - rotC; origC = SIZE - 1 - rotR; }

  let destR = nextRotR, destC = nextRotC;
  if (dir === 'right') { destR = nextRotR; destC = SIZE - 1 - nextRotC; }
  if (dir === 'up')    { destR = nextRotC; destC = nextRotR; }
  if (dir === 'down')  { destR = SIZE - 1 - nextRotC; destC = SIZE - 1 - nextRotR; }

  const tile = tilesData.find(t => t.r === origR && t.c === origC && !t.mergedOut);
  if (tile) {
    tile.r = destR;
    tile.c = destC;
    tile.val = newVal;
    if (isMerge) {
      tile.isPop = true;
      const duplicate = tilesData.find(t => t.r === destR && t.c === destC && t.id !== tile.id && !t.mergedOut);
      if (duplicate) duplicate.mergedOut = true;
    }
  }
}

function syncTilesDataWithGrid() {
  tilesData = [];
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] > 0) {
        tilesData.push({ id: Math.random().toString(36).substr(2, 9), r, c, val: grid[r][c], isNew: false, isPop: false });
      }
    }
  }
}

function checkEnd() {
  let win = false;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 2048) win = true;

  if (win) { 
    showOverlay('You Win!', '— 恭喜拼出 2048 🏆 —'); 
    saveGameToHistory();
    return; 
  }

  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return;
      if (r + 1 < SIZE && grid[r][c] === grid[r+1][c]) return;
      if (c + 1 < SIZE && grid[r][c] === grid[r][c+1]) return;
    }
    
  showOverlay('Game Over', '— 沒有可移動的方塊 —');
  saveGameToHistory();
}

function showOverlay(title, sub) {
  document.getElementById('overlay-title').innerHTML = title.includes('Win') ? 'You <em>Win!</em>' : 'Game <em>Over</em>';
  document.getElementById('overlay-sub').textContent = sub;
  document.getElementById('overlay').classList.add('show');
}

function saveGameToHistory() {
  let history = JSON.parse(localStorage.getItem(`2048-history-${SIZE}`) || '[]');
  history.push({ score, date: new Date().toLocaleDateString(), moves });
  if (history.length > 10) history.shift(); 
  localStorage.setItem(`2048-history-${SIZE}`, JSON.stringify(history));
  drawChart();
}

function drawChart() {
  const canvas = document.getElementById('statsChart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const history = JSON.parse(localStorage.getItem(`2048-history-${SIZE}`) || '[]');
  if (history.length === 0) {
    ctx.font = '11px "DM Mono"'; ctx.fillStyle = '#8A827B'; ctx.textAlign = 'center';
    ctx.fillText('NO GAME DATA YET. COMPLETE A GAME TO TRACK TRENDS.', canvas.width/2, canvas.height/2);
    return;
  }

  const padding = 30;
  const chartW = canvas.width - padding * 2;
  const chartH = canvas.height - padding * 2;
  
  const scores = history.map(h => h.score);
  const maxScore = Math.max(...scores, 100);

  const rootStyle = getComputedStyle(document.documentElement);
  const gridColor = rootStyle.getPropertyValue('--chart-grid').trim() || '#F5F2EB';
  const mainLineColor = rootStyle.getPropertyValue('--ac').trim() || '#6b4c32';
  const textColor = rootStyle.getPropertyValue('--text').trim() || '#3A322D';
  const dimColor = rootStyle.getPropertyValue('--dim').trim() || '#8A827B';

  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padding, padding); ctx.lineTo(padding + chartW, padding);
  ctx.moveTo(padding, padding + chartH/2); ctx.lineTo(padding + chartW, padding + chartH/2);
  ctx.moveTo(padding, padding + chartH); ctx.lineTo(padding + chartW, padding + chartH);
  ctx.stroke();

  ctx.strokeStyle = mainLineColor; ctx.lineWidth = 2;
  ctx.beginPath();
  
  const stepX = history.length > 1 ? chartW / (history.length - 1) : chartW;

  history.forEach((h, index) => {
    const x = padding + index * stepX;
    const y = padding + chartH - (h.score / maxScore) * chartH;
    if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  history.forEach((h, index) => {
    const x = padding + index * stepX;
    const y = padding + chartH - (h.score / maxScore) * chartH;
    
    ctx.fillStyle = textColor; ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI*2); ctx.fill();

    ctx.font = '9px "DM Mono"'; ctx.fillStyle = dimColor; ctx.textAlign = 'center';
    ctx.fillText(h.score, x, y - 8);
    ctx.fillText(`G${index+1}`, x, padding + chartH + 14);
  });
}

document.getElementById('shareBtn').addEventListener('click', () => {
  const text = `🕹️ LYZ · 2048 (${SIZE}x${SIZE} 模式)\n我的最新戰績：${score} 分！總步數：${moves} 步。\n快來挑戰看看吧！`;
  if (navigator.share) {
    navigator.share({ title: 'LYZ · 2048 Achievement', text: text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.style.opacity = 1;
      setTimeout(() => toast.style.opacity = 0, 2000);
    });
  }
});

const themeToggle = document.getElementById('themeToggle');

function initTheme() {
  const savedTheme = localStorage.getItem('lyz-theme') || 'light';
  currentTheme = savedTheme;
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeToggle.textContent = savedTheme.toUpperCase();
  drawChart();
}

themeToggle.addEventListener('click', () => {
  const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
  currentTheme = nextTheme;
  document.documentElement.setAttribute('data-theme', nextTheme);
  localStorage.setItem('lyz-theme', nextTheme);
  themeToggle.textContent = nextTheme.toUpperCase();
  drawChart();
});

window.addEventListener('storage', (e) => {
  if (e.key === 'lyz-theme' && e.newValue) {
    currentTheme = e.newValue;
    document.documentElement.setAttribute('data-theme', e.newValue);
    themeToggle.textContent = e.newValue.toUpperCase();
    drawChart();
  }
});

const KEYS = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
              KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down'};
document.addEventListener('keydown', e => {
  if (KEYS[e.code]) { e.preventDefault(); move(KEYS[e.code]); }
});

let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  if(!tx || !ty) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
  tx = null; ty = null;
}, {passive:true});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (!prevGrid) return;
  grid = prevGrid.map(r => [...r]); 
  score = prevScore;
  moves = prevMoves;
  prevGrid = null;
  syncTilesDataWithGrid();
  render();
  document.getElementById('overlay').classList.remove('show');
});

document.getElementById('newBtn').addEventListener('click', () => { saveGameToHistory(); init(); });
document.getElementById('overlay-btn').addEventListener('click', init);

initTheme();
init();
</script>
