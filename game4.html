<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · Memory Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<script>(function(){var t=localStorage.getItem('lyz-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="light"]{
  --bg:#F5F2EB; --panel-bg:#FFFFFF; --text-main:#3A322D; --text-dim:#8A827B;
  --border-color:#3A322D; --bd:#d8cfc2; --bd2:#c9bfb0; --ac:#6b4c32; --as:rgba(107,76,50,.09);
  --nav-bg:rgba(245,242,235,.92);
  --gold:#C5A059; --red:#A94442;
  --overlay-bg:#F5F2EB;
  --card-back:#FFFFFF; --card-back-bd:#D0C9BC; --card-back-inner:#c9bfb0;
  --card-back-label:#c9bfb0;
  --progress-bg:#EAE3D5;
}
:root[data-theme="dark"]{
  --bg:#1A1614; --panel-bg:#25201E; --text-main:#EAE3D5; --text-dim:#A29990;
  --border-color:#C5A059; --bd:#3A322D; --bd2:#4A3F3A; --ac:#C5A059; --as:rgba(197,160,89,.08);
  --nav-bg:rgba(26,22,20,.92);
  --gold:#DFD5BF; --red:#E26D6D;
  --overlay-bg:#1A1614;
  --card-back:#25201E; --card-back-bd:#4A3F3A; --card-back-inner:#3A322D;
  --card-back-label:#4A3F3A;
  --progress-bg:#3A322D;
}

body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;align-items:center;letter-spacing:1px;transition:background .3s,color .3s;}

/* ── Nav ── */
.site-nav{position:fixed;top:0;left:0;width:100%;background:var(--nav-bg);backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid var(--bd);z-index:200;display:flex;align-items:center;justify-content:center;padding:0 32px;height:48px;animation:navIn .7s cubic-bezier(.16,1,.3,1) forwards;transition:background .3s,border-color .3s;}
@keyframes navIn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.nav-logo{position:absolute;left:32px;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .2s;}
.nav-logo:hover{color:var(--ac);}
.nav-center{display:flex;gap:20px;list-style:none;flex-wrap:wrap;align-items:center;justify-content:center;}
.nav-center a{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .2s;position:relative;}
.nav-center a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.nav-center a:hover,.nav-center a.active{color:var(--text-main);}
.nav-center a:hover::after,.nav-center a.active::after{transform:scaleX(1);}
.nav-right{position:absolute;right:32px;display:flex;align-items:center;gap:8px;}
.theme-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--bd);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.theme-btn:hover{background:var(--as);border-color:var(--ac);color:var(--ac);}
.hub-link{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--ac);background:var(--as);color:var(--ac);text-decoration:none;transition:all .2s;}
.hub-link:hover{background:var(--ac);color:var(--bg);}

/* ── Page ── */
.page{width:100%;max-width:680px;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--ac);letter-spacing:.24em;text-transform:uppercase;margin-bottom:12px;}
.page-title{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2rem,5vw,3rem);line-height:1;margin-bottom:8px;color:var(--text-main);}
.page-title em{font-style:italic;color:var(--ac);}
.page-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-dim);letter-spacing:.08em;margin-bottom:28px;}

/* ── HUD ── */
.hud{display:flex;gap:12px;width:100%;margin-bottom:12px;}
.hud-box{flex:1;background:var(--panel-bg);border:1px solid var(--bd);padding:10px 16px;display:flex;flex-direction:column;gap:4px;transition:background .3s,border-color .3s;}
.hud-box.accent{border-color:var(--ac);}
.hud-label{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;}
.hud-val{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;color:var(--text-main);}
.hud-box.accent .hud-val{color:var(--ac);}

/* ── Progress Bar ── */
.progress-container{width:100%;height:6px;background:var(--progress-bg);margin-bottom:16px;position:relative;overflow:hidden;transition:background .3s;}
.progress-bar{width:100%;height:100%;background:var(--ac);transition:width 1s linear,background-color .3s;}
.progress-bar.warning{background:var(--red);}

/* ── Combo Badge ── */
.combo-display{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:bold;color:var(--gold);min-height:18px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;opacity:0;transition:opacity .2s;}
.combo-display.active{opacity:1;animation:comboPop .3s cubic-bezier(.175,.885,.32,1.275);}
@keyframes comboPop{0%{transform:scale(.7)}100%{transform:scale(1)}}

/* ── Controls ── */
.ctrl-row{display:flex;gap:10px;margin-bottom:20px;width:100%;align-items:center;flex-wrap:wrap;}
.btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;border:1px solid var(--bd2);background:transparent;color:var(--text-main);cursor:pointer;transition:all .2s;}
.btn:hover{background:var(--text-main);color:var(--bg);}
.btn.primary{background:var(--text-main);color:var(--bg);border-color:var(--text-main);}
.btn.primary:hover{background:var(--ac);border-color:var(--ac);}
.size-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text-dim);letter-spacing:.1em;margin-right:4px;}
.size-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;padding:8px 14px;border:1px solid var(--bd);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.size-btn:hover,.size-btn.on{background:var(--text-main);color:var(--bg);border-color:var(--text-main);}

/* ── Grid ── */
.grid{display:grid;gap:10px;width:100%;margin-bottom:20px;}
.grid.g4{grid-template-columns:repeat(4,1fr);}
.grid.g6{grid-template-columns:repeat(6,1fr);}

/* ── Card 3D flip ── */
.card{aspect-ratio:1;perspective:600px;cursor:pointer;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.16,1,.3,1);}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;}
.card-back{background:var(--card-back);border:1px solid var(--card-back-bd);position:relative;overflow:hidden;transition:background .3s,border-color .3s;}
.card-back::before{content:'';position:absolute;inset:6px;border:1px solid var(--card-back-inner);}
.card-back::after{content:'L · Y · Z';font-family:'DM Mono',monospace;font-size:.5rem;color:var(--card-back-label);letter-spacing:.15em;position:absolute;bottom:8px;right:8px;}
.card-front{background:var(--panel-bg);border:1px solid var(--ac);transform:rotateY(180deg);font-size:clamp(1.2rem,4vw,2rem);transition:background .3s;}
.card.matched .card-front{background:var(--as);border-color:var(--ac);}
.card:not(.flipped):not(.matched):hover .card-back{background:var(--bg);border-color:var(--ac);}

/* ── Overlay ── */
.overlay-wrap{position:relative;width:100%;min-height:420px;display:flex;flex-direction:column;}
.overlay{display:none;position:absolute;inset:0;width:100%;height:100%;background:var(--overlay-bg);backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100;padding:30px;text-align:center;transition:background .3s;}
.overlay.show{display:flex;}
.ov-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;color:var(--text-main);}
.ov-title em{font-style:italic;color:var(--ac);}
.ov-sub{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-dim);letter-spacing:.1em;text-align:center;line-height:1.6;}

/* ── Input ── */
.leaderboard-input-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px;}
.leaderboard-input{background:transparent;border:1px solid var(--bd);color:var(--text-main);padding:8px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;text-align:center;outline:none;transition:border-color .2s;}
.leaderboard-input:focus{border-color:var(--ac);}

/* ── Rankings table ── */
.best-table{width:100%;border:1px solid var(--bd);background:var(--panel-bg);margin-top:16px;border-collapse:collapse;transition:background .3s,border-color .3s;}
.best-table th{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ac);text-align:left;padding:.5rem .9rem;border-bottom:1px solid var(--bd);}
.best-table td{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-dim);padding:.45rem .9rem;border-bottom:1px solid var(--bd);}
.best-table tr:last-child td{border-bottom:none;}
.best-table td:first-child{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text-main);}
.best-table tr.highlight td{background:var(--as);color:var(--text-main);font-weight:500;}

@media(max-width:500px){
  .site-nav{padding:0 12px;}
  .nav-center{display:none;}
  .nav-logo{left:12px;}
  .nav-right{right:12px;}
  .page{padding:68px 12px 40px;}
  .hud{flex-wrap:wrap;}
  .hud-box{min-width:calc(50% - 6px);}
}
</style>
</head>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">LYZ.dev</a>
  <ul class="nav-center">
    <li><a href="gamehub.html">🎮 遊戲大廳</a></li>
    <li><a href="game.html">🐍 誰是DAVID蛇</a></li>

    <li><a href="game3.html">🕹️ 2048</a></li>

  <div class="nav-right">
    <a href="gamehub.html" class="hub-link">← 大廳</a>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">Dark</button>
  </div>
</nav>

<div class="page">
  <div class="eyebrow">Memory Game · 益智</div>
  <h1 class="page-title">Memory <em>Card</em></h1>
  <p class="page-sub">翻開兩張相同的牌來配對，在限時內頂住壓力完成挑戰</p>

  <div class="hud">
    <div class="hud-box accent">
      <div class="hud-label">Pairs / 配對</div>
      <div class="hud-val" id="hPairs">0 / 0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Moves / 步數</div>
      <div class="hud-val" id="hMoves">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Time Remaining / 剩餘時間</div>
      <div class="hud-val" id="hTime">--s</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Score / 本局得分</div>
      <div class="hud-val" id="hScore">0</div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="combo-display" id="comboDisplay"></div>

  <div class="ctrl-row">
    <button class="btn primary" id="newBtn">New Game</button>
    <span class="size-label">Size :</span>
    <button class="size-btn on" data-sz="4" onclick="setSize(4,this)">4 × 4</button>
    <button class="size-btn" data-sz="6" onclick="setSize(6,this)">6 × 6</button>
  </div>

  <div class="overlay-wrap">
    <div class="grid g4" id="grid"></div>
    <div class="overlay show" id="overlay">
      <div class="ov-title" id="ovTitle">Memory <em>Card</em></div>
      <div class="ov-sub" id="ovSub">— 按 New Game 或下方按鈕開始 —</div>
      <div id="overlayActionArea">
        <button class="btn primary" id="ovBtn" style="width:160px;margin-top:4px;">開始遊戲</button>
      </div>
    </div>
  </div>

  <table class="best-table" id="bestTable">
    <thead><tr><th>模式</th><th>名次 & 玩家</th><th>得分</th><th>步數</th><th>剩餘時間</th></tr></thead>
    <tbody id="bestBody"></tbody>
  </table>
</div>

<script>
// ── Theme ──
function getTheme(){ return document.documentElement.getAttribute('data-theme'); }
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('lyz-theme',t);
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent = t==='dark'?'Light':'Dark';
}
function toggleTheme(){ applyTheme(getTheme()==='dark'?'light':'dark'); }
applyTheme(localStorage.getItem('lyz-theme')||'light');
window.addEventListener('storage',e=>{ if(e.key==='lyz-theme'&&e.newValue) applyTheme(e.newValue); });

const EMOJIS = [
  '🌸','🍀','🦋','🐚','🌙','⭐','🍵','🎋',
  '🪷','🌿','🦚','🐠','🌊','🔮','🪐','🎴',
  '🦊','🐧','🌺','🍁','🎯','🎪','🧩','🎨',
];

const Sound = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  playFlip() {
    this.init(); const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(440, this.ctx.currentTime);
    g.gain.setValueAtTime(0.08, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
    osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.05);
  },
  playMatch() {
    this.init(); const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
    osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.08);
    osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.16);
    g.gain.setValueAtTime(0.12, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
    osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.3);
  },
  playFail() {
    this.init(); const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(70, this.ctx.currentTime + 0.25);
    g.gain.setValueAtTime(0.15, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.28);
    osc.connect(g); g.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.28);
  }
};

let size = 4, totalPairs, matched, moves, timer, timeLeft, maxTime, locked, score, combo;
let first = null, second = null;

function setSize(s, btn) {
  size = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('on', b === btn));
  const grid = document.getElementById('grid');
  grid.className = `grid g${size}`;
  updateBestDisplay();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  Sound.init();
  clearInterval(timer);
  matched = 0; moves = 0; score = 0; combo = 0; first = null; second = null;
  maxTime = size === 4 ? 45 : 90;
  timeLeft = maxTime;
  locked = true;

  const comboDisp = document.getElementById('comboDisplay');
  comboDisp.className = 'combo-display';
  comboDisp.textContent = '';

  totalPairs = (size * size) / 2;
  const pool = shuffle([...EMOJIS]).slice(0, totalPairs);
  const cards = shuffle([...pool, ...pool]);

  const grid = document.getElementById('grid');
  grid.className = `grid g${size}`;
  grid.innerHTML = '';

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card flipped';
    card.dataset.val = emoji;
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${emoji}</div>
      </div>`;
    card.addEventListener('click', () => flip(card));
    grid.appendChild(card);
  });

  document.getElementById('ovTitle').innerHTML = `Memory <em>Card</em>`;
  document.getElementById('ovSub').textContent = `— 限時挑戰！翻開相同卡片進行配對 —`;
  document.getElementById('overlay').classList.remove('show');
  updateHUD();

  const pBar = document.getElementById('progressBar');
  pBar.style.width = '100%';
  pBar.classList.remove('warning');
  document.getElementById('hTime').textContent = `Preview...`;

  setTimeout(() => {
    const allCards = document.querySelectorAll('.card');
    allCards.forEach(c => c.classList.remove('flipped'));
    locked = false;
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById('hTime').textContent = timeLeft + 's';
      const pct = (timeLeft / maxTime) * 100;
      pBar.style.width = pct + '%';
      if (pct <= 20) pBar.classList.add('warning');
      if (timeLeft <= 0) { clearInterval(timer); gameOver(); }
    }, 1000);
    document.getElementById('hTime').textContent = timeLeft + 's';
  }, 2000);
}

function flip(card) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (card === first) return;

  Sound.playFlip();
  card.classList.add('flipped');

  if (!first) { first = card; return; }

  second = card; moves++; locked = true;

  if (first.dataset.val === second.dataset.val) {
    first.classList.add('matched');
    second.classList.add('matched');
    combo++;
    score += 100 + (combo * 50);
    triggerComboAnim();
    Sound.playMatch();
    first = null; second = null; locked = false;
    matched++;
    updateHUD();
    if (matched === totalPairs) win();
  } else {
    combo = 0;
    document.getElementById('comboDisplay').classList.remove('active');
    Sound.playFail();
    const a = first, b = second;
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      first = null; second = null; locked = false;
    }, 850);
    updateHUD();
  }
}

function triggerComboAnim() {
  const cd = document.getElementById('comboDisplay');
  if (combo >= 2) {
    cd.textContent = `✦ Combo × ${combo} (+${combo * 50} 獎勵分) ✦`;
    cd.classList.add('active');
  } else {
    cd.classList.remove('active');
  }
}

function updateHUD() {
  document.getElementById('hPairs').textContent = `${matched} / ${totalPairs}`;
  document.getElementById('hMoves').textContent = moves;
  document.getElementById('hScore').textContent = score;
}

function gameOver() {
  locked = true;
  Sound.playFail();
  document.getElementById('ovTitle').innerHTML = `挑戰 <em>Failed</em>`;
  document.getElementById('ovSub').textContent = `— 時間到！未能在限時內配對完成 —`;
  document.getElementById('overlayActionArea').innerHTML = `
    <button class="btn primary" onclick="startGame()" style="width:160px;margin-top:12px;">重新挑戰</button>`;
  document.getElementById('overlay').classList.add('show');
}

function win() {
  clearInterval(timer);
  locked = true;
  const timeBonus = timeLeft * 25;
  const finalScore = score + timeBonus;

  document.getElementById('ovTitle').innerHTML = `Stage <em style="color:var(--gold);">Clear!</em>`;

  const records = JSON.parse(localStorage.getItem(`mem-records-${size}`) || '[]');
  const isLeader = records.length < 5 || finalScore > records[records.length - 1].score;

  let actionHtml = '';
  if (isLeader) {
    actionHtml = `
      <div class="leaderboard-input-wrap">
        <div class="ov-sub" style="color:var(--gold);margin-bottom:4px;">🏆 恭喜榮登排行榜！請輸入你的大名：</div>
        <input type="text" id="playerName" class="leaderboard-input" maxlength="10" value="Anonymous" />
        <button class="btn primary" onclick="submitScore(${finalScore})" style="margin-top:12px;width:160px;">送出紀錄並重開</button>
      </div>`;
  } else {
    actionHtml = `<button class="btn primary" onclick="startGame()" style="width:160px;margin-top:12px;">再玩一次</button>`;
  }

  document.getElementById('ovSub').innerHTML = `
    模式: ${size}×${size} · 總步數: ${moves} 步<br>
    剩餘時間加成: +${timeBonus} 分<br>
    <b>最終總得分: ${finalScore} 分</b>`;
  document.getElementById('overlayActionArea').innerHTML = actionHtml;
  document.getElementById('overlay').classList.add('show');
}

function submitScore(finalScore) {
  const nameInput = document.getElementById('playerName');
  const name = nameInput ? nameInput.value.trim() : 'Anonymous';
  let records = JSON.parse(localStorage.getItem(`mem-records-${size}`) || '[]');
  records.push({ name: name || 'Anonymous', score: finalScore, moves, timeLeft });
  records.sort((a, b) => b.score - a.score);
  records = records.slice(0, 5);
  localStorage.setItem(`mem-records-${size}`, JSON.stringify(records));
  updateBestDisplay();
  startGame();
}

function updateBestDisplay() {
  const records = JSON.parse(localStorage.getItem(`mem-records-${size}`) || '[]');
  const body = document.getElementById('bestBody');
  body.innerHTML = '';
  if (records.length === 0) {
    body.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-dim);">暫無排行紀錄，等你來霸榜！</td></tr>`;
    return;
  }
  records.forEach((r, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${size} × ${size}</td>
      <td><b>#${idx + 1}</b> ${r.name}</td>
      <td style="color:var(--ac);font-weight:bold;">${r.score}</td>
      <td>${r.moves} 步</td>
      <td>${r.timeLeft}s</td>`;
    body.appendChild(tr);
  });
}

document.getElementById('newBtn').addEventListener('click', startGame);
document.getElementById('ovBtn').addEventListener('click', startGame);
updateBestDisplay();
</script>
</body>
</html>
