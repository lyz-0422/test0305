<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LYZ · Memory Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EB;--panel:#FFFFFF;--text:#3A322D;--dim:#8A827B;
  --bd:#D0C9BC;--bd2:#c9bfb0;--ac:#6b4c32;--ac2:#7d5a3c;
  --as:rgba(107,76,50,.09);--gold:#C5A059;--red:#A94442;
}
body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* ── Nav ── */
.site-nav{position:fixed;top:0;left:0;width:100%;background:rgba(245,242,235,.92);backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid var(--bd);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:48px;animation:navIn .7s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes navIn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.nav-logo{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;}
.nav-logo:hover{color:var(--ac);}
.nav-links{display:flex;gap:22px;list-style:none;flex-wrap:wrap;}
.nav-links a{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}

/* ── Page ── */
.page{width:100%;max-width:680px;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;}
.eyebrow{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--ac);letter-spacing:.24em;text-transform:uppercase;margin-bottom:12px;}
.page-title{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2rem,5vw,3rem);line-height:1;margin-bottom:8px;}
.page-title em{font-style:italic;color:var(--ac);}
.page-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--dim);letter-spacing:.08em;margin-bottom:28px;}

/* ── HUD ── */
.hud{display:flex;gap:12px;width:100%;margin-bottom:16px;}
.hud-box{flex:1;background:var(--panel);border:1px solid var(--bd);padding:10px 16px;display:flex;flex-direction:column;gap:4px;}
.hud-box.accent{border-color:var(--ac);}
.hud-label{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;}
.hud-val{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;color:var(--text);}
.hud-box.accent .hud-val{color:var(--ac);}

/* ── Controls ── */
.ctrl-row{display:flex;gap:10px;margin-bottom:20px;width:100%;align-items:center;flex-wrap:wrap;}
.btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;border:1px solid var(--bd2);background:transparent;color:var(--text);cursor:pointer;transition:all .2s;}
.btn:hover{background:var(--text);color:var(--bg);}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn.primary:hover{background:var(--ac);border-color:var(--ac);}
.size-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--dim);letter-spacing:.1em;margin-right:4px;}
.size-btn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;padding:8px 14px;border:1px solid var(--bd);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;}
.size-btn:hover,.size-btn.on{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ── Grid ── */
.grid{display:grid;gap:10px;width:100%;margin-bottom:20px;}
.grid.g4{grid-template-columns:repeat(4,1fr);}
.grid.g6{grid-template-columns:repeat(6,1fr);}

/* ── Card 3D flip ── */
.card{aspect-ratio:1;perspective:600px;cursor:pointer;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.16,1,.3,1);}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;}
.card-back{background:var(--panel);border:1px solid var(--bd);position:relative;overflow:hidden;}
.card-back::before{content:'';position:absolute;inset:6px;border:1px solid var(--bd2);}
.card-back::after{content:'L · Y · Z';font-family:'DM Mono',monospace;font-size:.5rem;color:var(--bd2);letter-spacing:.15em;position:absolute;bottom:8px;right:8px;}
.card-front{background:var(--panel);border:1px solid var(--ac);transform:rotateY(180deg);font-size:clamp(1.2rem,4vw,2rem);}
.card.matched .card-front{background:var(--as);border-color:var(--ac);}
.card:not(.flipped):not(.matched):hover .card-back{background:var(--bg);border-color:var(--ac);}

/* ── Overlay ── */
.overlay-wrap{position:relative;width:100%;}
.overlay{display:none;position:absolute;inset:0;background:rgba(245,242,235,.92);backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;min-height:300px;}
.overlay.show{display:flex;}
.ov-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;}
.ov-title em{font-style:italic;color:var(--ac);}
.ov-sub{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);letter-spacing:.1em;text-align:center;}

/* ── Best table ── */
.best-table{width:100%;border:1px solid var(--bd);background:var(--panel);margin-top:8px;}
.best-table th{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ac);text-align:left;padding:.5rem .9rem;border-bottom:1px solid var(--bd);}
.best-table td{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);padding:.45rem .9rem;border-bottom:1px solid var(--bd);}
.best-table tr:last-child td{border-bottom:none;}
.best-table td:first-child{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text);}

@media(max-width:500px){
  .site-nav{padding:0 14px;}
  .nav-links{gap:10px;}
  .page{padding:68px 12px 40px;}
  .hud{flex-wrap:wrap;}
  .hud-box{min-width:calc(50% - 6px);}
}
</style>
</head>
<body>

<div class="page">
  <div class="eyebrow">Memory Game · 益智</div>
  <h1 class="page-title">Memory <em>Card</em></h1>
  <p class="page-sub">翻開兩張相同的牌來配對，記住位置才是關鍵</p>

  <div class="hud">
    <div class="hud-box accent">
      <div class="hud-label">Pairs</div>
      <div class="hud-val" id="hPairs">0 / 0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Moves</div>
      <div class="hud-val" id="hMoves">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Time</div>
      <div class="hud-val" id="hTime">0s</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Best</div>
      <div class="hud-val" id="hBest">—</div>
    </div>
  </div>

  <div class="ctrl-row">
    <button class="btn primary" id="newBtn">New Game</button>
    <span class="size-label">Size :</span>
    <button class="size-btn on" data-sz="4" onclick="setSize(4,this)">4 × 4</button>
    <button class="size-btn" data-sz="6" onclick="setSize(6,this)">6 × 6</button>
  </div>

  <div class="overlay-wrap">
    <div class="grid g4" id="grid"></div>
    <div class="overlay show" id="overlay">
      <div class="ov-title">Memory <em>Card</em></div>
      <div class="ov-sub">— 按 New Game 開始 —</div>
      <button class="btn primary" id="ovBtn" style="width:160px;margin-top:4px;">開始遊戲</button>
    </div>
  </div>

  <table class="best-table" id="bestTable" style="display:none;">
    <thead><tr><th>模式</th><th>最佳步數</th><th>最佳時間</th></tr></thead>
    <tbody id="bestBody"></tbody>
  </table>
</div>

<script>
const EMOJIS = [
  '🌸','🍀','🦋','🐚','🌙','⭐','🍵','🎋',
  '🪷','🌿','🦚','🐠','🌊','🔮','🪐','🎴',
  '🦊','🐧','🌺','🍁','🎯','🎪','🧩','🎨',
];

let size = 4, totalPairs, matched, moves, timer, elapsed, locked;
let first = null, second = null;

function setSize(s, btn) {
  size = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('on', b === btn));
  const grid = document.getElementById('grid');
  grid.className = `grid g${size}`;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  clearInterval(timer);
  elapsed = 0; moves = 0; matched = 0; locked = false; first = null; second = null;
  totalPairs = (size * size) / 2;

  const pool = shuffle([...EMOJIS]).slice(0, totalPairs);
  const cards = shuffle([...pool, ...pool]);

  const grid = document.getElementById('grid');
  grid.className = `grid g${size}`;
  grid.innerHTML = '';

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.val = emoji;
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${emoji}</div>
      </div>`;
    card.addEventListener('click', () => flip(card));
    grid.appendChild(card);
  });

  document.getElementById('overlay').classList.remove('show');
  updateHUD();

  timer = setInterval(() => {
    elapsed++;
    document.getElementById('hTime').textContent = elapsed + 's';
  }, 1000);
}

function flip(card) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (card === first) return;

  card.classList.add('flipped');

  if (!first) { first = card; return; }

  second = card;
  moves++;
  document.getElementById('hMoves').textContent = moves;
  locked = true;

  if (first.dataset.val === second.dataset.val) {
    first.classList.add('matched');
    second.classList.add('matched');
    first = null; second = null; locked = false;
    matched++;
    updateHUD();
    if (matched === totalPairs) win();
  } else {
    const a = first, b = second;
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      first = null; second = null; locked = false;
    }, 900);
  }
}

function updateHUD() {
  document.getElementById('hPairs').textContent = `${matched} / ${totalPairs}`;
  document.getElementById('hMoves').textContent = moves;
  updateBestDisplay();
}

function win() {
  clearInterval(timer);
  const key4 = 'mem-best-4', key6 = 'mem-best-6';
  const key = size === 4 ? key4 : key6;
  const prev = JSON.parse(localStorage.getItem(key) || 'null');
  if (!prev || moves < prev.moves || (moves === prev.moves && elapsed < prev.time)) {
    localStorage.setItem(key, JSON.stringify({ moves, time: elapsed }));
  }

  setTimeout(() => {
    document.getElementById('ovTitle') && (document.getElementById('ovTitle').innerHTML =
      `Stage <em>Clear!</em>`);
    document.getElementById('overlay').innerHTML = `
      <div class="ov-title">Stage <em>Clear!</em></div>
      <div class="ov-sub">— ${size}×${size} · ${moves} 步 · ${elapsed}s —</div>
      <button class="btn primary" onclick="startGame()" style="width:160px;margin-top:4px;">再玩一次</button>`;
    document.getElementById('overlay').classList.add('show');
    updateBestDisplay();
  }, 500);
}

function updateBestDisplay() {
  const b4 = JSON.parse(localStorage.getItem('mem-best-4') || 'null');
  const b6 = JSON.parse(localStorage.getItem('mem-best-6') || 'null');
  const best = size === 4 ? b4 : b6;
  document.getElementById('hBest').textContent = best ? `${best.moves}步` : '—';

  if (b4 || b6) {
    const tbl = document.getElementById('bestTable');
    tbl.style.display = '';
    document.getElementById('bestBody').innerHTML = `
      ${b4 ? `<tr><td>4 × 4</td><td>${b4.moves} 步</td><td>${b4.time}s</td></tr>` : ''}
      ${b6 ? `<tr><td>6 × 6</td><td>${b6.moves} 步</td><td>${b6.time}s</td></tr>` : ''}`;
  }
}

document.getElementById('newBtn').addEventListener('click', startGame);
document.getElementById('ovBtn') && document.getElementById('ovBtn').addEventListener('click', startGame);
updateBestDisplay();
</script>
</body>
